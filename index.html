/* ─── FlipCard ─── */
const FlipCard = ({ front, back, t }) => {
  const [flipped, setFlipped] = useState(false);
  return (
    <div className="perspective cursor-pointer h-36" onClick={() => setFlipped(!flipped)}>
      <div className={`transform-style-3d relative w-full h-full transition-transform duration-500 ${flipped ? 'rotate-y-180' : ''}`}>
        <div className="backface-hidden absolute inset-0 bg-white dark:bg-slate-800 rounded-xl p-4 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm">
          <p className="font-serif font-bold text-center text-[#004030] dark:text-[#D8C3A5]">{front}</p>
          <p className="text-xs text-slate-400 mt-2">{t.flip_prompt}</p>
        </div>
        <div className="backface-hidden rotate-y-180 absolute inset-0 bg-[#004030] dark:bg-slate-700 rounded-xl p-4 flex items-center justify-center">
          <p className="text-sm text-center text-[#D8C3A5] dark:text-slate-200 leading-relaxed">{back}</p>
        </div>
      </div>
    </div>
  );
};

/* ─── ModuleQuiz ─── */
const ModuleQuiz = ({ questions, t, moduleId, onQuizSubmit }) => {
  const [selected, setSelected] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [quizIndices] = useState(() =>
    [...Array(questions.length).keys()].sort(() => Math.random() - 0.5).slice(0, 4)
  );
  return (
    <div className="mt-8 bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
      <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-6">{t.quiz_title}</h3>
      {quizIndices.map((qIdx, i) => {
        const q = questions[qIdx];
        return (
          <div key={qIdx} className="mb-6">
            <p className="font-bold mb-3">{i+1}. {q.q}</p>
            <div className="space-y-2">
              {q.opts.map((opt, oIdx) => (
                <button key={oIdx} onClick={() => !submitted && setSelected(s => ({...s, [i]: oIdx}))}
                  className={`w-full text-left px-4 py-3 rounded-lg border transition-all text-sm
                    ${submitted
                      ? oIdx === q.ans ? 'bg-green-100 border-green-500 dark:bg-green-900/30 dark:border-green-500'
                        : selected[i] === oIdx ? 'bg-red-100 border-red-400 dark:bg-red-900/30 dark:border-red-400' : 'border-slate-200 dark:border-slate-700'
                      : selected[i] === oIdx ? 'border-[#004030] dark:border-[#D8C3A5] bg-[#004030]/5 dark:bg-[#D8C3A5]/5' : 'border-slate-200 dark:border-slate-700 hover:border-slate-400'
                    }`}>
                  {opt}
                </button>
              ))}
            </div>
            {submitted && <p className="mt-2 text-sm text-slate-600 dark:text-slate-400 italic">{t.explanation}: {q.exp}</p>}
          </div>
        );
      })}
      {!submitted
        ? <button onClick={() => { setSubmitted(true); const c = quizIndices.filter((qIdx,i) => selected[i] === questions[qIdx].ans).length; onQuizSubmit(moduleId, c, quizIndices.length); }}
            disabled={Object.keys(selected).length < quizIndices.length}
            className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 transition-all">
            {t.submit}
          </button>
        : <div className="flex items-center gap-4">
            <span className="font-bold text-[#004030] dark:text-[#D8C3A5]">{t.score}: {quizIndices.filter((qIdx,i) => selected[i] === questions[qIdx].ans).length}/{quizIndices.length}</span>
            <button onClick={() => { setSelected({}); setSubmitted(false); }}
              className="px-6 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold rounded-lg">
              {t.retry}
            </button>
          </div>
      }
    </div>
  );
};

    <p className="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">{desc}</p>
  </a>
);

/* ─── H2 with icon ─── */
const H2 = ({ children, icon, number }) => (
  <h2 className="text-2xl sm:text-3xl md:text-4xl font-serif font-black text-[#004030] dark:text-[#D8C3A5] mb-6 flex items-center gap-3">
    {icon && <span className="text-2xl">{icon}</span>}
    {number !== undefined && <span>{number}.</span>}
    <span>{children}</span>
  </h2>

/* ─── Lab Components (top-level) ─── */
const IntegrationResponsivenessLab = ({lang}) => {
  const [cx, setCx] = useState(50);
  const [cy, setCy] = useState(50);
  const strategies = lang==='zh'
    ? [{name:'國際策略',x:25,y:25},{name:'全球策略',x:25,y:75},{name:'多國策略',x:75,y:25},{name:'跨國策略',x:75,y:75}]
    : [{name:'International',x:25,y:25},{name:'Global',x:25,y:75},{name:'Multi-domestic',x:75,y:25},{name:'Transnational',x:75,y:75}];
  const closest = strategies.reduce((best,s) => {
    const d = Math.sqrt((cx-s.x)**2+(cy-s.y)**2);
    return d < best.d ? {s,d} : best;
  }, {s:strategies[0],d:999}).s;
  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
      <h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-4">{lang==='zh'?'整合-回應架構模擬器':'Integration-Responsiveness Simulator'}</h4>
      <div className="relative w-full" style={{paddingBottom:'100%',maxWidth:320,margin:'0 auto'}}>
        <svg viewBox="0 0 200 200" className="absolute inset-0 w-full h-full">
          <rect x="0" y="0" width="200" height="200" fill="none" stroke="#cbd5e1" strokeWidth="1"/>
          <line x1="100" y1="0" x2="100" y2="200" stroke="#e2e8f0" strokeWidth="0.5" strokeDasharray="4"/>
          <line x1="0" y1="100" x2="200" y2="100" stroke="#e2e8f0" strokeWidth="0.5" strokeDasharray="4"/>
          <text x="100" y="196" textAnchor="middle" fontSize="8" fill="#64748b">{lang==='zh'?'在地回應壓力 →':'Local Responsiveness →'}</text>
          <text x="4" y="100" textAnchor="start" fontSize="8" fill="#64748b" transform="rotate(-90,4,100)">{lang==='zh'?'全球整合壓力 →':'Global Integration →'}</text>
          {strategies.map((s,i)=><g key={i}><circle cx={s.x*2} cy={200-s.y*2} r="18" fill="#004030" opacity="0.12"/><text x={s.x*2} y={200-s.y*2+3} textAnchor="middle" fontSize="7" fill="#004030" fontWeight="bold">{s.name}</text></g>)}
          <circle cx={cx*2} cy={200-cy*2} r="6" fill="#D8C3A5" stroke="#004030" strokeWidth="2"/>
        </svg>
      </div>
      <div className="mt-4 space-y-2">
        <label className="text-sm text-slate-600 dark:text-slate-400">{lang==='zh'?'在地回應':'Local Responsiveness'}: {cx}%</label>
        <input type="range" min="0" max="100" value={cx} onChange={e=>setCx(+e.target.value)} className="w-full"/>
        <label className="text-sm text-slate-600 dark:text-slate-400">{lang==='zh'?'全球整合':'Global Integration'}: {cy}%</label>
        <input type="range" min="0" max="100" value={cy} onChange={e=>setCy(+e.target.value)} className="w-full"/>
      </div>
      <p className="mt-3 text-sm font-bold text-[#004030] dark:text-[#D8C3A5]">{lang==='zh'?'最接近策略':'Closest Strategy'}: {closest.name}</p>
    </div>
  );
};

const EntryModeComparisonLab = ({lang}) => {
  const modes = lang==='zh'
    ? [{name:'出口',control:20,commit:15,risk:10},{name:'授權',control:25,commit:20,risk:20},{name:'加盟',control:35,commit:25,risk:25},{name:'合資',control:55,commit:55,risk:50},{name:'獨資子公司',control:95,commit:90,risk:85}]
    : [{name:'Export',control:20,commit:15,risk:10},{name:'Licensing',control:25,commit:20,risk:20},{name:'Franchising',control:35,commit:25,risk:25},{name:'Joint Venture',control:55,commit:55,risk:50},{name:'Wholly Owned',control:95,commit:90,risk:85}];
  const [selected, setSelected] = useState(0);
  const m = modes[selected];
  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
      <h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-4">{lang==='zh'?'進入模式比較器':'Entry Mode Comparator'}</h4>
      <div className="flex flex-wrap gap-2 mb-4">
        {modes.map((md,i)=><button key={i} onClick={()=>setSelected(i)} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${selected===i?'bg-[#004030] text-white dark:bg-[#D8C3A5] dark:text-[#004030]':'bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300'}`}>{md.name}</button>)}
      </div>
      {[{label:lang==='zh'?'控制程度':'Control',val:m.control},{label:lang==='zh'?'資源承諾':'Commitment',val:m.commit},{label:lang==='zh'?'風險程度':'Risk',val:m.risk}].map((bar,i)=>(
        <div key={i} className="mb-3">
          <div className="flex justify-between text-xs text-slate-600 dark:text-slate-400 mb-1"><span>{bar.label}</span><span>{bar.val}%</span></div>
          <div className="h-3 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden"><div className="h-full bg-[#004030] dark:bg-[#D8C3A5] rounded-full transition-all duration-500" style={{width:`${bar.val}%`}}/></div>
        </div>
      ))}
    </div>
  );
};

const DiamondModelLab = ({lang}) => {
  const [factors, setFactors] = useState({factor:60,demand:70,related:50,rivalry:80});
  const labels = lang==='zh'?{factor:'要素條件',demand:'需求條件',related:'相關支援產業',rivalry:'企業策略與競爭'}:{factor:'Factor Conditions',demand:'Demand Conditions',related:'Related Industries',rivalry:'Strategy & Rivalry'};
  const pts = [
    {x:150,y:30-factors.rivalry*0.25},
    {x:150+factors.demand*1.1,y:150},
    {x:150,y:150+factors.related*0.9},
    {x:150-factors.factor*1.1,y:150}
  ];
  const path = `M${pts.map(p=>`${p.x},${p.y}`).join(' L')} Z`;
  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
      <h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-4">{lang==='zh'?'波特鑽石模型模擬器':'Porter Diamond Simulator'}</h4>
      <svg viewBox="0 0 300 250" className="w-full max-w-xs mx-auto">
        <polygon points="150,30 260,150 150,240 40,150" fill="none" stroke="#e2e8f0" strokeWidth="1" strokeDasharray="4"/>
        <path d={path} fill="#004030" opacity="0.15" stroke="#004030" strokeWidth="2"/>
        {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="5" fill="#D8C3A5" stroke="#004030" strokeWidth="2"/>)}
        <text x="150" y="20" textAnchor="middle" fontSize="9" fill="#004030" fontWeight="bold">{labels.rivalry}</text>

      { q: "Porter 認為什麼類型的資源對建立國際競爭優勢最關鍵？", opts: ["天然資源稟賦","高度專業化的自生資源","廉價勞動力","政府提供的補貼"], ans: 1, exp: "Porter 強調高度專業化、自主培育的資源比天賦資源更關鍵" },
      { q: "日本汽車業在 20 世紀末的全球成功，鑽石模型會如何解釋？", opts: ["豐富的石油資源","多家大型企業在國內激烈競爭","政府限制外國汽車進口","日本消費者不重視品質"], ans: 1, exp: "多家主要生產商的激烈國內競爭驅動了創新、品質與效率" },
      { q: "美國半導體企業聚焦設計而非製造，這說明了什麼概念？", opts: ["垂直整合","策略與國家條件的一致性","多角化","經驗曲線"], ans: 1, exp: "企業策略須與母國的比較優勢相配合，美國優勢在技術人才而非低成本製造" },
      { q: "歐洲在許多高科技產業的失敗，Porter 認為可能原因是？", opts: ["缺乏資金","政府傾向扶植國家冠軍企業而消滅國內競爭","語言障礙","地理位置不佳"], ans: 1, exp: "Porter 認為政府扶植國家冠軍企業會消滅國內競爭，削弱創新動力" }
    ],

    m3_nav: "3. 進入模式", m3_title: "海外市場進入模式",
    m3_p1: "企業進入海外市場的方式構成一個從低承諾到高承諾的策略光譜。非股權模式包括出口（直接/間接）和契約安排（授權、加盟、統包工程、研發合約、共同行銷）；股權模式（FDI）包括合資企業（少數/50-50/多數）與獨資子公司（綠地投資或收購）。",
    m3_p2: "「選擇進入模式時須考量五個關鍵因素：競爭優勢是基於企業特定還是國家特定資源、產品是否可交易、企業是否具備海外成功所需的全部資源與能力、能否直接佔有資源報酬、以及交易成本。」",
    m3_p3: "eBay 在歐洲及拉丁美洲透過合資與收購成功擴張，但在亞洲市場卻因缺乏在地市場知識、產品本土化不足及管理過度集中化而挫敗，最終輸給了更懂在地需求的 Alibaba。這說明進入模式的選擇必須考量在地市場的獨特性。",
    m3_cards: [
      { title: "出口 Export", desc: "利用區位與經驗曲線優勢，但面臨高運輸成本、貿易障礙與當地經銷商管理問題" },
      { title: "授權 Licensing", desc: "低開發成本與風險，但無法實現區位經濟、全球策略協調，且有技術控制流失風險" },
      { title: "合資 Joint Venture", desc: "可獲得在地夥伴知識、分攤成本與風險，但可能有政治依賴及技術控制問題" },
      { title: "獨資子公司 WOS", desc: "技術保護最強，可實現全球策略協調與區位經濟，但成本與風險最高" }
    ],
    m3_terms: [
      { front: "加盟 Franchising", back: "加盟者銷售無形資產（品牌、商業模式）並要求加盟主遵守經營規範。低開發成本但品質控制較困難" },
      { front: "合資企業 Joint Venture", back: "通常為 50/50 股權合作，是進入新市場的偏好模式。可取得在地知識但可能犧牲策略控制" },
      { front: "綠地投資 Greenfield", back: "在外國從零開始建立子公司，屬獨資子公司（WOS）的一種。控制力最強但建設期長、投資高" }
    ],
    m3_q: [
      { q: "進入模式中，控制程度最高的是哪一種？", opts: ["出口","授權","合資","獨資子公司"], ans: 3, exp: "獨資子公司母公司持有 100% 股權，控制程度最高" },
      { q: "以下何者是授權模式的主要缺點？", opts: ["運輸成本高","無法控制技術與全球策略協調","投資金額太大","需要大量管理人才外派"], ans: 1, exp: "授權模式的主要缺點在於技術控制流失與無法進行全球策略協調" },
      { q: "Starbucks 自營門市而 McDonald's 採用加盟，主要原因是什麼？", opts: ["Starbucks 資金更多","Starbucks 的體驗難以契約化","McDonald's 品牌更強","法律規定不同"], ans: 1, exp: "Starbucks 的價值在於難以言明的體驗氛圍，不易寫入加盟合約" },
      { q: "eBay 在亞洲失敗的主要原因不包含？", opts: ["缺乏在地市場知識","管理過度集中化","產品本土化不足","貿易障礙太高"], ans: 3, exp: "eBay 在亞洲的問題在於對在地市場了解不足、產品缺乏本土創新、以及管理過於集權" },
      { q: "合資企業作為進入模式的優勢包括？", opts: ["完全控制技術","取得在地夥伴知識並分攤成本","無需投入任何資本","可完全避免政治風險"], ans: 1, exp: "合資的核心優勢是取得在地知識、分攤開發成本與風險" },
      { q: "企業的競爭優勢若基於國家特定資源，最適合的進入模式是？", opts: ["獨資子公司","合資","出口","加盟"], ans: 2, exp: "若競爭優勢來自母國的成本優勢，企業必須在母國生產並出口" },
      { q: "交易成本在進入模式決策中的角色是什麼？", opts: ["只影響出口決策","決定授權 vs. 直接投資的選擇","與進入模式無關","只有政府才需考慮"], ans: 1, exp: "交易成本（如關稅、合約監督成本）是選擇授權或直接投資的關鍵考量" },
      { q: "策略聯盟在進入模式架構中涵蓋哪些範圍？", opts: ["僅限授權","僅限合資","橫跨契約安排與合資兩大類","僅限獨資子公司"], ans: 2, exp: "策略聯盟的範圍橫跨契約安排（授權、共同行銷等）與合資企業" }
    ],

    m4_nav: "4. 跨國策略", m4_title: "跨國策略選擇：全球整合 vs. 在地回應",
    m4_p1: "跨國策略的核心張力在於全球整合壓力（供給面：成本降低需求）與在地回應壓力（需求面：消費者偏好、通路、法規差異）之間的取捨。整合-回應架構將策略分為四種類型：國際策略（Home Replication）、全球策略（Global Standardization）、多國策略（Multi-domestic）與跨國策略（Transnational）。",
    m4_p2: "「在消費偏好同質化且規模經濟龐大的產業（如噴射引擎），應採全球策略；在國家偏好顯著且回應成本可控的產業（如零售銀行），適合多國策略。」— 整合-回應架構的判斷邏輯",
    m4_p3: "Ghemawat 的 CAGE 架構從文化、行政/政治、地理、經濟四個維度衡量國家間距離。McDonald's 的「全球在地化」是平衡全球標準化與在地適應的典範：Big Mac 全球統一，但印度提供 McAloo Tikki，法國提供 Croque McDo，各國菜單兼顧在地口味。",
    m4_p4: "調和全球效率與在地適應需要依產品與功能拆解公司。R&D、採購和 IT 適合全球化整合；銷售、行銷和人力資源需要更高的在地差異化。P&G 對 Pringles 採全球標準化，對洗髮精和洗衣精則允許顯著的國家差異。",
    m4_cards: [
      { title: "國際策略", desc: "母國複製模式。核心能力集中、其他分散至各國單位。整合與回應壓力皆低" },
      { title: "全球策略", desc: "標準化模式。權力集中在全球最適位置，採全球產品事業部結構。整合壓力高、回應壓力低" },
      { title: "多國策略", desc: "在地化模式。權力下放至各國單位，採地區結構。整合壓力低、回應壓力高" },
      { title: "跨國策略", desc: "同時集中化與分散化，採全球矩陣結構。整合與回應壓力皆高，協調成本最高" }
    ],
    m4_terms: [
      { front: "整合-回應架構\nI-R Framework", back: "以全球整合壓力（成本降低）和在地回應壓力（差異化需求）兩個維度劃分四種跨國策略的經典架構" },
      { front: "CAGE 距離架構\nCAGE Framework", back: "Ghemawat 提出的四維度國家距離分析：文化（Cultural）、行政（Administrative）、地理（Geographic）、經濟（Economic）距離" },
      { front: "全球在地化\nGlocalization", back: "標準化可獲得規模經濟的部分，在地化消費者偏好最強且成本可控的部分。如 Honda Civic 在 110 個國家銷售但各有在地調整" }
    ],
    m4_q: [
      { q: "整合-回應架構中，全球整合壓力與在地回應壓力都高的策略是？", opts: ["國際策略","全球策略","多國策略","跨國策略"], ans: 3, exp: "跨國策略同時面對高全球整合與高在地回應壓力" },
      { q: "以下哪個產業最適合全球標準化策略？", opts: ["零售銀行","噴射引擎","殯葬服務","在地餐飲"], ans: 1, exp: "噴射引擎規模經濟龐大且客戶偏好高度同質化，適合全球策略" },
      { q: "CAGE 架構的 'A' 代表什麼？", opts: ["Arbitrage","Administrative","Aggregation","Advantage"], ans: 1, exp: "CAGE 中的 A 代表 Administrative（行政/政治）距離" },
      { q: "McDonald's 在印度不供應牛肉或豬肉，這說明了什麼策略考量？", opts: ["成本降低","全球標準化","在地文化回應","品牌弱化"], ans: 2, exp: "這是因應在地文化（宗教飲食禁忌）的典型在地回應" },
      { q: "P&G 對 Pringles 採全球標準化但對洗髮精允許國家差異，這屬於什麼做法？", opts: ["依產品拆解全球化程度","全面在地化","全面標準化","退出低回報市場"], ans: 0, exp: "P&G 依不同產品線的特性決定標準化或在地化程度" },
      { q: "Ghemawat 的 AAA 架構中，哪一個 A 指利用國家間差異創造價值？", opts: ["Aggregation","Adaptation","Arbitrage","Association"], ans: 2, exp: "Arbitrage 指利用國家間在資源、成本和知識上的差異來創造價值" },
      { q: "多國策略（Multi-domestic）的權力分配特點是？", opts: ["全部集中在母國","權力下放至各國單位","同時集中與分散","無需管理國際業務"], ans: 1, exp: "多國策略將權力下放至各國單位以最大化在地回應" },
      { q: "調和全球效率與在地適應時，以下哪個功能最適合全球整合？", opts: ["銷售","人力資源","研發","客戶服務"], ans: 2, exp: "R&D 具有最大的全球化整合潛力；銷售和人力資源需要更多在地差異化" }
    ],

    m5_nav: "5. 跨國組織", m5_title: "跨國組織設計",
    m5_p1: "Bartlett & Ghoshal 辨識出三個跨國企業發展時代：20 世紀初的歐洲跨國企業（分散聯邦）如 Unilever、Philips，各國子公司高度自主；二戰後的美國跨國企業（協調聯邦）如 GM、IBM，子公司自主但以美國母公司為技術與資金核心；1970-80 年代的日本挑戰（集中樞紐）如 Toyota、Matsushita，研發與製造集中在日本。",
    m5_p2: "「跨國公司是其歷史的俘虜：當初國際擴張時做出的策略-結構選擇，持續形塑其能力與限制。」— Bartlett & Ghoshal 的管理遺產論",
    m5_p3: "理想的跨國組織（Transnational）是一個整合網絡：每個國家單位都是為全體組織貢獻創意與能力的來源；各國單位可被指派全球範圍的產品或活動責任以取得規模經濟；總部的角色是建立組織脈絡以促進協調，而非直接管控。",
    m5_p4: "四種策略各有對應的組織結構：多國策略→地區結構，國際策略→國際事業部結構，全球策略→全球產品事業部結構，跨國策略→全球矩陣（或「心中的矩陣」）。跨國策略的協調需求最高，組織文化最為重要。",
    m5_cards: [
      { title: "歐洲模式：分散聯邦", desc: "各國子公司高度自主，完整執行從研發到行銷的全部功能。優勢是在地適應力強，挑戰是整合不足" },
      { title: "美國模式：協調聯邦", desc: "子公司有一定自主權但以美國母公司為核心。擅長移轉技術與新產品至各國子公司" },
      { title: "日本模式：集中樞紐", desc: "研發與製造集中在日本，海外子公司負責銷售與配銷。全球標準化產品提供無與倫比的成本與品質優勢" },
      { title: "跨國網絡：整合網路", desc: "各國子公司提供差異化貢獻，知識聯合開發與全球共享。是最複雜但也最強大的組織形態" }
    ],
    m5_terms: [
      { front: "管理遺產\nAdministrative Heritage", back: "跨國企業在國際擴張時形成的資產配置、管理職責與關係網絡，深刻影響其當前能力與轉型限制" },
      { front: "跨國組織\nTransnational Organization", back: "Bartlett & Ghoshal 提出的理想型態：整合的分散網絡，各國單位貢獻獨特能力，知識在多方向間流動" },
      { front: "全球矩陣\nGlobal Matrix", back: "同時以產品事業部與地區單位雙軸組織的結構，對應跨國策略，協調需求與組織文化重要性最高" }
    ],
    m5_q: [
      { q: "Bartlett & Ghoshal 的分散聯邦模式最能描述哪類跨國企業？", opts: ["日本跨國企業","美國跨國企業","20 世紀初的歐洲跨國企業","新興市場跨國企業"], ans: 2, exp: "分散聯邦是 20 世紀初歐洲跨國企業的典型模式" },
      { q: "以下哪項是跨國組織（Transnational）的核心特徵？", opts: ["所有決策集中在母國","各國子公司完全獨立運作","整合網絡中知識聯合開發並全球共享","僅以出口方式服務海外市場"], ans: 2, exp: "跨國組織的核心是整合網絡，知識在多方向間流動" },
      { q: "四種策略中，組織文化重要性最高的是？", opts: ["多國策略","國際策略","全球策略","跨國策略"], ans: 3, exp: "跨國策略的協調複雜度最高，組織文化的凝聚力最為重要" },
      { q: "日本集中樞紐模式的主要優勢是什麼？", opts: ["在地回應能力強","全球標準化帶來的成本與品質優勢","快速取得在地市場知識","組織文化最靈活"], ans: 1, exp: "集中在日本的研發與製造提供全球標準化產品的成本與品質優勢" },
      { q: "知識管理方面，多國策略的知識流動特點是？", opts: ["知識在母公司開發並移轉至子公司","知識在各子公司獨立開發並留在當地","知識在多方向間廣泛流動","知識集中在總部與關鍵據點"], ans: 1, exp: "多國策略下知識在各子公司獨立開發並留在當地，跨國流動有限" },
      { q: "Philips 將醫療電子責任交給美國子公司說明了什麼趨勢？", opts: ["撤離歐洲市場","將全球產品事業部管理權設在母國以外","放棄醫療電子事業","從跨國轉向多國策略"], ans: 1, exp: "越來越多跨國企業將全球產品事業部控制權設在母國以外的最適地點" },
      { q: "McKinsey 研究發現跨國企業相較國家冠軍企業面臨哪個挑戰？", opts: ["技術落後","全球化罰金：難以建立共享願景與在地關係","資金不足","品牌知名度低"], ans: 1, exp: "跨國企業在建立共享願景、維持專業標準、以及經營在地關係方面面臨困難" },
      { q: "管理遺產（Administrative Heritage）的含義是？", opts: ["企業的財務報表歷史","國際擴張時形成的策略-結構配置持續影響當前能力","管理階層的年齡結構","行政流程的自動化程度"], ans: 1, exp: "管理遺產指國際擴張時的選擇如何持續形塑企業的能力與限制" }
    ],

    m6_nav: "6. 外部資源", m6_title: "延伸學習資源", m6_desc: "精選的學術與實務資源，幫助您深入探索地理區域擴張策略",
    mlab_nav: "7. 互動實驗室", mlab_title: "互動實驗室", mlab_desc: "透過互動模擬器與視覺化工具，直觀理解關鍵策略架構",

    m4_p1: "The core tension in multinational strategy is the tradeoff between global integration pressures (supply side: cost reduction) and local responsiveness pressures (demand side: consumer preferences, distribution channels, regulations). The Integration-Responsiveness framework classifies strategies into four types: International (Home Replication), Global (Standardization), Multi-domestic (Localization), and Transnational.",

  };

  // Menu outside click
  useEffect(() => {
    if (!menuOpen) return;
    const handler = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [menuOpen]);

  // Module switch
  const switchModule = (m) => {
    setModule(m);
    window.scrollTo({ top: 0, behavior: 'smooth' });
    if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); setTtsState('idle'); }
  };

  // Quiz submit
  const handleQuizSubmit = (modId, correct, total) => {
    setAnalytics(a => {
      const qc = [...a.quizCorrect]; qc[modId] += correct;
      const qt = [...a.quizTotal]; qt[modId] = 8;
      const qa = [...a.quizAnswered]; qa[modId] += total;
      return {...a, quizCorrect: qc, quizTotal: qt, quizAnswered: qa};
    });
  };

  // TTS
  const handleTTS = (action) => {
    if (!('speechSynthesis' in window)) return;
    if (action === 'stop') { window.speechSynthesis.cancel(); setTtsState('idle'); return; }
    if (action === 'pause') { window.speechSynthesis.pause(); setTtsState('paused'); return; }
    if (action === 'play') {
      if (ttsState === 'paused') { window.speechSynthesis.resume(); setTtsState('playing'); return; }
      window.speechSynthesis.cancel();
      const sep = lang === 'zh' ? '。 ' : '. ';
      let texts = [];
      if (module === 0) {
        texts = [t.m0_title, t.m0_intro, t.m0_why, t.m0_why_desc, ...(t.m0_stats||[]).map(s=>`${s.label}: ${s.val}`), ...(t.m0_modules||[]).map(m=>`${m.title}. ${m.desc}`)].filter(Boolean);
      } else if (module >= 1 && module <= 5) {
        const mk = `m${module}`;
        texts = [t[`${mk}_title`], ...[1,2,3,4,5].map(n=>t[`${mk}_p${n}`]).filter(Boolean), ...(t[`${mk}_cards`]||[]).map(c=>`${c.title}. ${c.desc}`), ...(t[`${mk}_terms`]||[]).flatMap(term=>[term.front, term.back])].filter(Boolean);
      } else if (module === 6) {
        texts = [t.m6_title, t.m6_desc].filter(Boolean);
      } else if (module === 7) {
        texts = [t.mlab_title, t.mlab_desc, ...(t.mlab_labs||[]).map(l=>`${l.title}. ${l.desc}`)].filter(Boolean);
      } else {
        texts = [t.analytics_title, t.analytics_desc].filter(Boolean);
      }
      const text = texts.join(sep);
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.95;
      const voices = window.speechSynthesis.getVoices();
      if (lang === 'zh') {
        const v = voices.find(v=>v.lang==='zh-TW'&&v.name.includes('Yating')) || voices.find(v=>v.lang==='zh-TW') || voices.find(v=>v.lang.startsWith('zh'));
        if (v) utterance.voice = v; utterance.lang = 'zh-TW';
      } else {
        const v = voices.find(v=>v.lang==='en-GB'&&(v.name.includes('Male')||v.name.includes('Daniel'))) || voices.find(v=>v.lang==='en-GB') || voices.find(v=>v.lang.startsWith('en'));
        if (v) utterance.voice = v; utterance.lang = 'en-GB';
      }
      utterance.onend = () => setTtsState('idle');
      utterance.onerror = () => setTtsState('idle');
      window.speechSynthesis.speak(utterance);
      setTtsState('playing');
    }
  };

  // CSV export
  const exportCSV = () => {
    const BOM = '\uFEFF';
    const header = `${t.analytics_module},${t.analytics_time}(${t.analytics_sec}),${t.analytics_clicks}(${t.analytics_times}),${t.analytics_correct_ans_total}\n`;
    const rows = modulesList.map((m,i) => {
      const qt = analytics.quizTotal[i]; const qa = analytics.quizAnswered[i]; const qc = analytics.quizCorrect[i];
      return `"${m.title}",${analytics.time[i]},${analytics.clicks[i]},${qt>0?`${qc}/${qa}/${qt}`:t.analytics_no_data}`;
    }).join('\n');
    const meta = `\n\n${t.analytics_group},${studentInfo.group}\n${t.analytics_dept},${studentInfo.dept}\n${t.analytics_id},${studentInfo.id}\n${t.analytics_name},${studentInfo.name}`;
    const blob = new Blob([BOM+header+rows+meta], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `learning_analytics_${studentInfo.id||'export'}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  const modulesList = [
    { id:0, icon:'📋', num:0, title: t.m0_nav },
    { id:1, icon:'🚀', num:1, title: t.m1_nav },
    { id:2, icon:'💎', num:2, title: t.m2_nav },
    { id:3, icon:'🚪', num:3, title: t.m3_nav },
    { id:4, icon:'🌐', num:4, title: t.m4_nav },
    { id:5, icon:'🏢', num:5, title: t.m5_nav },
    { id:6, icon:'📚', num:6, title: t.m6_nav, isGlobe: true },
    { id:7, icon:'⚡', num:7, title: t.mlab_nav, isLab: true },
    { id:8, icon:'📊', num:8, title: lang==='zh'?'8. 學習歷程':'8. Analytics' }
  ];

  const fade = 'animate-fade-in';

  // Render Resources
  const renderResources = () => {
    const resources = [
      { cat: lang==='zh'?'教科書與經典文獻':'Textbooks & Classics', icon:'📖', items:[
        { label: lang==='zh'?'Grant: Contemporary Strategy Analysis Ch.12':'Grant: Contemporary Strategy Analysis Ch.12', url:'https://www.wiley.com/en-us/Contemporary+Strategy+Analysis-p-9781119815235', desc: lang==='zh'?'本單元核心教材 — 全球策略與跨國企業':'Core textbook for this module — Global Strategy and the MNC' },
        { label: lang==='zh'?'Porter: Competitive Advantage of Nations':'Porter: Competitive Advantage of Nations', url:'https://hbr.org/1990/03/the-competitive-advantage-of-nations', desc: lang==='zh'?'國家競爭優勢與鑽石模型的原始文獻':'Original work on national competitive advantage and the Diamond model' },
        { label: lang==='zh'?'Bartlett & Ghoshal: Managing Across Borders':'Bartlett & Ghoshal: Managing Across Borders', url:'https://www.hbs.edu/faculty/Pages/item.aspx?num=139', desc: lang==='zh'?'跨國組織與 Transnational 模型經典著作':'Classic on transnational organization and MNC management' }
      ]},
      { cat: lang==='zh'?'線上學習資源':'Online Learning', icon:'🎓', items:[
        { label:'Harvard Business Review — Global Strategy', url:'https://hbr.org/topic/subject/global-strategy', desc: lang==='zh'?'HBR 全球策略專題文章':'HBR articles on global strategy topics' },
        { label: lang==='zh'?'Ghemawat: CAGE Distance Framework':'Ghemawat: CAGE Distance Framework', url:'https://hbr.org/2001/09/distance-still-matters-the-hard-reality-of-global-expansion', desc: lang==='zh'?'Ghemawat 的 CAGE 距離架構原始文章':'Ghemawat\'s original CAGE framework article' },
        { label:'WTO — Trade Statistics', url:'https://www.wto.org/english/res_e/statis_e/statis_e.htm', desc: lang==='zh'?'世界貿易組織國際貿易統計資料':'WTO international trade statistics database' }
      ]},
      { cat: lang==='zh'?'案例研究':'Case Studies', icon:'🔍', items:[
        { label: lang==='zh'?'eBay vs. Alibaba in China':'eBay vs. Alibaba in China', url:'https://hbr.org/product/ebay-in-china/714473-PDF-ENG', desc: lang==='zh'?'eBay 在中國市場的挫敗與 Alibaba 崛起的經典案例':'Classic case on eBay\'s failure and Alibaba\'s rise in China' },
        { label: lang==='zh'?'McDonald\'s 全球在地化策略':'McDonald\'s Glocalization Strategy', url:'https://www.mcdonalds.com', desc: lang==='zh'?'McDonald\'s 如何平衡全球標準化與在地適應':'How McDonald\'s balances global standardization with local adaptation' }
      ]}
    ];
    return (
      <div className="space-y-10 animate-fade-in">
        <H2 icon={modulesList[6].icon} number={6}>{t.m6_title}</H2>
        <p className="text-slate-600 dark:text-slate-400">{t.m6_desc}</p>
        {resources.map((sec,si)=>(
          <div key={si}>
            <h3 className="flex items-center gap-2 text-xl font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-4"><span>{sec.icon}</span>{sec.cat}</h3>
            <div className="grid md:grid-cols-2 gap-3">{sec.items.map((l,i)=><LinkCard key={i} {...l}/>)}</div>
          </div>
        ))}
        <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 rounded-xl p-5 border border-[#004030]/20 dark:border-[#D8C3A5]/20">
          <p className="text-sm text-slate-600 dark:text-slate-400">{lang==='zh'?'⚠️ 以上連結為外部資源，內容可能隨時更新或移除，僅供學術參考之用。':'⚠️ These are external resources that may be updated or removed at any time. For academic reference only.'}</p>
        </div>
      </div>
    );
  };

  // Render Lab
  const renderLab = () => (
    <div className="space-y-8 animate-fade-in">
      <H2 icon={modulesList[7].icon} number={7}>{t.mlab_title}</H2>
      <p className="mt-4 text-slate-600 dark:text-slate-400">{t.mlab_desc}</p>
      <IntegrationResponsivenessLab lang={lang}/>
      <div className="grid md:grid-cols-2 gap-6">
        <EntryModeComparisonLab lang={lang}/>
        <DiamondModelLab lang={lang}/>
      </div>
      <GlobalValueChainLab lang={lang}/>
      <div className="grid md:grid-cols-2 gap-6">
        <InternationalSalesLab lang={lang}/>
        <CAGEDistanceLab lang={lang}/>
      </div>
    </div>
  );

  // Render Analytics
  const renderAnalytics = () => {
    const totalTime = analytics.time.reduce((a,b)=>a+b,0);
    const totalClicks = analytics.clicks.reduce((a,b)=>a+b,0);
    const totalCorrect = analytics.quizCorrect.reduce((a,b)=>a+b,0);
    const totalAnswered = analytics.quizAnswered.reduce((a,b)=>a+b,0);
    const overallAcc = totalAnswered > 0 ? Math.round(totalCorrect/totalAnswered*100) : 0;
    const canExport = studentInfo.group && studentInfo.dept && studentInfo.id && studentInfo.name;
    return (
      <div className="space-y-8 animate-fade-in">
        <H2 icon={modulesList[8].icon} number={8}>{t.analytics_title}</H2>
        <p className="text-slate-600 dark:text-slate-400">{t.analytics_desc}</p>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
          {[{val:`${Math.floor(totalTime/60)}m ${totalTime%60}s`,label:t.analytics_total_time},{val:totalClicks,label:t.analytics_total_clicks},{val:`${overallAcc}%`,label:t.analytics_overall_acc}].map((s,i)=>(
            <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
              <div className="text-2xl font-black font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{s.val}</div>
              <div className="text-xs text-slate-500 dark:text-slate-400">{s.label}</div>
            </div>
          ))}
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm border-collapse">
            <thead><tr className="bg-[#004030] text-white dark:bg-slate-700">
              <th className="p-3 text-left">{t.analytics_module}</th><th className="p-3">{t.analytics_time}</th><th className="p-3">{t.analytics_clicks}</th><th className="p-3">{t.analytics_correct_ans_total}</th>
            </tr></thead>
            <tbody>{modulesList.map((m,i)=>(
              <tr key={i} className="border-b border-slate-200 dark:border-slate-700 even:bg-slate-50 dark:even:bg-slate-800/50">
                <td className="p-3 font-medium">{m.title}</td>
                <td className="p-3 text-center">{analytics.time[i]}{t.analytics_sec}</td>
                <td className="p-3 text-center">{analytics.clicks[i]}{t.analytics_times}</td>
                <td className="p-3 text-center">{analytics.quizTotal[i]>0?`${analytics.quizCorrect[i]}/${analytics.quizAnswered[i]}/${analytics.quizTotal[i]}`:t.analytics_no_data}</td>
              </tr>
            ))}</tbody>
          </table>
        </div>
        <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
          <h3 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_form_title}</h3>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label className="text-sm font-medium text-slate-600 dark:text-slate-400 mb-1 block">{t.analytics_group}</label>
              <select value={studentInfo.group} onChange={e=>setStudentInfo(s=>({...s,group:e.target.value}))} className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200">
                <option value="">--</option>{t.group_options.map(g=><option key={g} value={g}>{g}</option>)}
              </select>
            </div>
            <div><label className="text-sm font-medium text-slate-600 dark:text-slate-400 mb-1 block">{t.analytics_dept}</label><input placeholder={t.analytics_dept_ph} value={studentInfo.dept} onChange={e=>setStudentInfo(s=>({...s,dept:e.target.value}))} className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200"/></div>
            <div><label className="text-sm font-medium text-slate-600 dark:text-slate-400 mb-1 block">{t.analytics_id}</label><input placeholder={t.analytics_id_ph} value={studentInfo.id} onChange={e=>setStudentInfo(s=>({...s,id:e.target.value}))} className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200"/></div>
            <div><label className="text-sm font-medium text-slate-600 dark:text-slate-400 mb-1 block">{t.analytics_name}</label><input placeholder={t.analytics_name_ph} value={studentInfo.name} onChange={e=>setStudentInfo(s=>({...s,name:e.target.value}))} className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200"/></div>
          </div>
          <div className="mt-4">
            <button onClick={exportCSV} disabled={!canExport} className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 transition-all">{t.analytics_export_csv}</button>
            {!canExport && <p className="text-xs text-slate-400 mt-2">{t.analytics_fill_required}</p>}
          </div>
        </div>
      </div>
    );
  };

  // Render module content
  const renderModuleContent = (modNum) => {
    const mk = `m${modNum}`;
    return (
      <div className={`space-y-6 text-lg leading-relaxed text-slate-700 dark:text-slate-300 ${fade}`}>
        <H2 icon={modulesList[modNum].icon} number={modNum}>{t[`${mk}_title`]}</H2>
        <p>{t[`${mk}_p1`]}</p>
        <p className="p-4 bg-slate-100 dark:bg-slate-800 rounded-lg italic font-serif text-base">{t[`${mk}_p2`]}</p>
        <p>{t[`${mk}_p3`]}</p>
        {t[`${mk}_p4`] && <p>{t[`${mk}_p4`]}</p>}
        {t[`${mk}_cards`] && (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {t[`${mk}_cards`].map((c,i)=>(
              <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700 shadow-sm">
                <h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-2">{c.title}</h4>
                <p className="text-sm text-slate-600 dark:text-slate-400">{c.desc}</p>
              </div>
            ))}
          </div>
        )}
        <div className="mt-8">
          <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-4">{t.key_terms}</h3>
          <div key={`terms-${module}`} className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {t[`${mk}_terms`].map((term,i) => <FlipCard key={i} front={term.front} back={term.back} t={t}/>)}
          </div>
        </div>
        <ModuleQuiz key={`quiz-${module}`} questions={t[`${mk}_q`]} t={t} moduleId={module} onQuizSubmit={handleQuizSubmit}/>
      </div>
    );
  };

  // Main render content
  const renderContent = () => {
    switch(module) {
      case 0: return (
        <div className={`space-y-8 text-lg leading-relaxed text-slate-700 dark:text-slate-300 ${fade}`}>
          <div className="bg-[#004030] dark:bg-slate-800 rounded-2xl p-8 text-white">
            <p className="text-xs font-bold uppercase tracking-widest text-[#D8C3A5] mb-3">{lang==='zh'?'課程簡介':'Course Introduction'}</p>
            <h2 className="text-3xl md:text-4xl font-serif font-black text-white mb-4">{t.m0_title}</h2>
            <p className="text-[#D8C3A5]/90 text-base leading-relaxed">{t.m0_intro}</p>
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border-l-4 border-[#D8C3A5] shadow-sm">
            <h3 className="text-xl font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-3">{t.m0_why}</h3>
            <p className="text-base">{t.m0_why_desc}</p>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            {t.m0_stats.map((s,i)=>(
              <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
                <div className="text-2xl md:text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{s.val}</div>
                <div className="text-xs text-slate-500 dark:text-slate-400">{s.label}</div>
              </div>
            ))}
          </div>
          <div>
            <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-4">{lang==='zh'?'課程模組':'Course Modules'}</h3>
            <div className="space-y-3">
              {t.m0_modules.map((m,i)=>(
                <button key={i} onClick={()=>switchModule(i+1)} className="w-full flex items-center gap-5 bg-white dark:bg-slate-800 rounded-xl px-6 py-4 shadow-sm border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all group text-left">
                  <div className="text-3xl font-black font-serif text-[#D8C3A5] w-10 shrink-0">{m.num}</div>
                  <div className="flex-1">
                    <div className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{m.title}</div>
                    <div className="text-sm text-slate-500">{m.desc}</div>
                  </div>
                  <IconChevronRight size={20} className="text-slate-300 group-hover:text-[#004030] dark:group-hover:text-[#D8C3A5] transition-colors"/>
                </button>
              ))}
            </div>
          </div>
          <div className="flex justify-end">

      case 1: case 2: case 3: case 4: case 5: return renderModuleContent(module);
      case 6: return renderResources();
      case 7: return renderLab();
      case 8: return renderAnalytics();
      default: return null;

  };

  return (
    <div className="min-h-screen bg-[#f4f4f4] dark:bg-[#121212] font-sans flex flex-col overflow-x-hidden pt-16">
      {/* Header */}
      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30">
        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
          <div className="flex items-center gap-3">
            {/* Hamburger */}
            <div className="relative" ref={menuRef}>
              <button onClick={()=>setMenuOpen(!menuOpen)} className="p-2 hover:bg-white/10 rounded-lg transition-colors" aria-label="Toggle menu">
                {menuOpen ? <IconX size={20}/> : <IconMenu size={20}/>}
              </button>
              {menuOpen && (
                <div className="absolute top-full left-0 mt-1 w-64 max-w-[calc(100vw-2rem)] max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100] overflow-x-hidden">
                  <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-2 border-b border-slate-200 dark:border-slate-700">

                  </div>
                  {modulesList.map(m => (
                    <button key={m.id} onClick={()=>{switchModule(m.id);setMenuOpen(false);}}
                      className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-left ${module===m.id?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold':'text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                      <span className={module===m.id?'text-[#D8C3A5]':'opacity-50'}>{m.isGlobe?<IconGlobe size={16}/>:m.isLab?<IconZapLab size={16}/>:m.icon}</span>

              <span className="font-serif font-black text-[#D8C3A5] text-lg tracking-widest">{t.brand}</span>
              <span className="font-serif font-bold text-white text-sm hidden sm:inline">{t.title}</span>
            </button>
          </div>
          {/* Controls */}
          <div className="flex items-center gap-1 sm:gap-2">
            <div className="flex items-center gap-1 mr-1 sm:mr-2">
              {ttsState==='idle'&&<button onClick={()=>handleTTS('play')} className="p-1.5 hover:bg-white/10 rounded-lg" title={t.audio_read}><IconPlay size={16}/></button>}
              {ttsState==='playing'&&<><button onClick={()=>handleTTS('pause')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconPause size={16}/></button><button onClick={()=>handleTTS('stop')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconSquare size={16}/></button></>}
              {ttsState==='paused'&&<><button onClick={()=>handleTTS('play')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconPlay size={16}/></button><button onClick={()=>handleTTS('stop')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconSquare size={16}/></button></>}
            </div>
            <button onClick={()=>{setLang(lang==='zh'?'en':'zh');if('speechSynthesis' in window){window.speechSynthesis.cancel();setTtsState('idle');}}} className="px-2 py-1 text-xs sm:text-sm font-bold bg-white/10 hover:bg-white/20 rounded-lg transition-colors">{lang==='zh'?'EN':'中'}</button>
            <button onClick={()=>setIsDark(!isDark)} className="p-1.5 sm:p-2 hover:bg-white/10 rounded-lg transition-colors">{isDark?<IconSun size={16}/>:<IconMoon size={16}/>}</button>
          </div>
        </div>
      </header>

      {/* Body */}
      <div className="flex-1 flex max-w-7xl mx-auto w-full px-3 sm:px-4 lg:px-6 py-6 gap-6">
        {/* Sidebar */}
        <aside className="hidden md:block w-64 shrink-0">
          <div className="sticky top-20 space-y-1">
            {modulesList.map(m=>(
              <button key={m.id} onClick={()=>switchModule(m.id)}
                className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm transition-all text-left ${module===m.id?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold shadow-sm':'text-slate-600 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 hover:shadow-sm'}`}>
                <span className={`shrink-0 ${module===m.id?'text-[#D8C3A5]':'opacity-50'}`}>{m.isGlobe?<IconGlobe size={16}/>:m.isLab?<IconZapLab size={16}/>:m.icon}</span>
                <span className="truncate">{m.title}</span>
              </button>
            ))}
          </div>
        </aside>

        {/* Main */}
        <main className="flex-1 min-w-0" onClick={handleContentClick}>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 md:p-8">
            {renderContent()}
            {/* Bottom nav */}
            <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-300 dark:border-slate-700">
              <button onClick={()=>switchModule(Math.max(0,module-1))} disabled={module===0}
                className="px-6 py-3 font-serif font-bold text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5] disabled:opacity-0 uppercase text-sm tracking-wider flex items-center transition-colors">
                ← {t.nav_prev}
              </button>
              <button onClick={()=>switchModule(Math.min(TOTAL-1,module+1))} disabled={module===TOTAL-1}
                className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white disabled:opacity-0 uppercase text-sm tracking-wider shadow-md flex items-center transition-all">
                {t.nav_next} <IconArrowRight size={16} className="ml-2"/>
              </button>
            </div>
          </div>
        </main>
      </div>

      {/* Footer */}
      <footer className="h-8 bg-[#004030] flex items-center justify-between px-4 shrink-0">
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs truncate">{t.date} · {t.copyright}</span>
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs flex items-center gap-3 shrink-0">
          <span className="flex items-center gap-1">
            Architect:&nbsp;
            <a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">Prof. Shihmin Lo</a>
          </span>
          <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="text-[#D8C3A5] hover:text-white transition-colors font-bold cursor-pointer">Top ↑</button>
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
