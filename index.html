m0_intro:"企業成長的另一個維度是跨越國界的「地理區域擴張」。國際化不僅是進入新市場，更是為了獲取全球資源與套利機會。本模組探討企業為何走向國際、如何評估海外市場的「CAGE 距離」、選擇適當的市場進入模式，以及如何在全球整合與在地回應之間取得平衡。",

m1_nav:"1. 動機與優勢",m1_title:"國家競爭優勢與國際化動機",
m1_p1:"企業走向國際化的傳統動機是尋求市場 (Market-seeking) 與尋求資源 (Resource-seeking)。然而，在現代全球化經濟中，尋求效率 (Efficiency-seeking，如全球供應鏈分工) 與尋求策略性資產 (Strategic asset-seeking，如併購矽谷的 AI 新創以獲取技術) 變得同等重要。",
m1_p2:"「為何某些國家的企業在特定產業中特別具有全球競爭力？這並非偶然，而是由該國的國家環境所孕育。」—— Michael Porter",
m1_p3:"為了探討國家環境如何賦予企業優勢，Michael Porter 提出了「國家鑽石模型」(National Diamond Model)。該模型包含四個相互作用的要素：(1) 要素條件 (Factor conditions)：如特定領域的高階人才或基礎設施；(2) 需求條件 (Demand conditions)：國內市場客戶越挑剔，越能逼迫企業創新；(3) 相關與支援產業 (Related and supporting industries)：強大的產業聚落能提供創新協同效應；(4) 企業策略、結構與競爭對手 (Firm strategy, structure, and rivalry)：國內競爭越激烈，企業在國際上越強悍。",
m1_p4:"企業的跨國擴張，本質上是將其在母國孕育的「所有權優勢」(Ownership advantages，如專利、品牌) 結合地主國的「區位優勢」(Location advantages，如廉價勞力、龐大市場)，以創造超越本土競爭對手的價值。",
m1_cards:[
  {title:"尋求市場 (Market-seeking)",desc:"當國內市場飽和或規模太小，企業必須將產品推向海外以分攤龐大的研發或固定成本。例如瑞士的雀巢 (Nestlé) 高度依賴海外市場。"},
  {title:"尋求效率 (Efficiency-seeking)",desc:"企業將價值鏈的不同環節配置在全球成本最低或效率最高的地方。例如 Apple 將設計留在加州，將組裝移至中國或印度。"},
  {title:"Porter 的「需求條件」",desc:"日本消費者對電子產品極度挑剔且喜愛微型化，這種苛刻的國內需求，迫使 Sony 和 Panasonic 開發出領先全球的微型電子技術。"},
  {title:"國內競爭的鍛鍊",desc:"德國汽車產業（賓士、BMW、Audi、福斯）在國內廝殺慘烈，這種殘酷的「內部競爭」反而鍛鍊出他們稱霸全球的競爭力。"}
],
m1_terms:[

  {front:"National Diamond Model\n國家鑽石模型",back:"Porter 提出解釋國家競爭優勢的理論框架，強調要素、需求、支援產業與國內競爭四者的互動。"},
  {front:"Location Advantages\n區位優勢",back:"特定國家或地區所獨有，能降低生產成本或增加產品價值的優勢，如自然資源、廉價勞力或優惠稅率。"}
],
m1_q:[
  {q:"企業併購矽谷的 AI 新創公司，主要屬於哪一種國際化動機？",opts:["尋求市場 (Market-seeking)","尋求資源 (Resource-seeking)","尋求效率 (Efficiency-seeking)","尋求策略性資產 (Strategic asset-seeking)"],ans:3,exp:"為了獲取先進技術、品牌或特定組織能力而進行的跨國投資，屬於尋求策略性資產。"},
  {q:"根據 Porter 的國家鑽石模型，下列何者是提升企業國際競爭力的正面因素？",opts:["政府完全保護企業免受競爭","國內消費者非常挑剔且要求極高","國內缺乏相關供應商","國內資源極度匱乏"],ans:1,exp:"挑剔的國內客戶（需求條件）會逼迫企業不斷創新與提升品質，從而在國際上具備強大競爭力。"},

  {q:"Nike 將鞋類製造轉移至亞洲國家，主要動機是？",opts:["尋求市場","尋求效率 (追求最低成本區位)","尋求策略性資產","政府強迫"],ans:1,exp:"將勞力密集的價值鏈環節移至工資較低的國家，是典型的尋求效率動機。"},
  {q:"「所有權優勢」(Ownership advantages) 指的是：",opts:["企業擁有國外的土地","企業擁有獨特的專利、品牌或管理技術，使其能克服外來者劣勢","政府給予的特權","企業股票完全被內部人持有"],ans:1,exp:"所有權優勢是跨國企業賴以在海外競爭的核心武器，用以抵銷不熟悉當地市場的劣勢。"},
  {q:"在 Porter 的鑽石模型中，國內競爭的激烈程度對企業有何影響？",opts:["會削弱企業的國際競爭力","會迫使企業持續改善與創新，進而強化國際競爭力","會導致企業破產","沒有影響"],ans:1,exp:"殘酷的國內競爭是企業最強的鍛鍊場，能在國內存活的企業通常在國際上也非常強悍。"},
  {q:"如果一個國家的基礎設施落後，但政府大量投資培育特定領域的高階工程師，這屬於改善鑽石模型中的哪一項？",opts:["需求條件","初階要素條件","進階要素條件 (Advanced Factor Conditions)","相關產業"],ans:2,exp:"Porter 強調，像高階人才與科研機構這類「進階且專業化的要素條件」，比天然資源更具策略重要性。"}
],

m2_nav:"2. 評估海外市場",m2_title:"評估海外市場：CAGE 距離架構",
m2_p1:"企業在評估海外市場時，往往過度依賴「GDP 規模」或「人口數」等硬性經濟指標，而忽略了跨國經營的真實摩擦力。Pankaj Ghemawat 指出，距離不僅僅是地理上的，更包含了多重維度。",
m2_p2:"「距離依然存在。我們沒有進入一個無國界的世界。忽視距離的企業，終將在海外市場付出慘痛代價。」—— Pankaj Ghemawat",
m2_p3:"Ghemawat 提出了「CAGE 距離架構」(CAGE Distance Framework) 來全面評估雙邊市場的差異：(1) 文化距離 (Cultural Distance)：語言、宗教、價值觀與社會規範的差異。(2) 行政/政治距離 (Administrative/Political Distance)：缺乏殖民歷史連結、無共同貨幣、政治敵對或保護主義法規。(3) 地理距離 (Geographic Distance)：實體距離、缺乏共同邊界、無直航或氣候差異。(4) 經濟距離 (Economic Distance)：人均收入、基礎設施品質與人力資源成本的落差。",
m2_p4:"不同的產業對不同維度的距離敏感度各異。例如：食品業與傳媒業對「文化距離」極度敏感；受高度管制的產業（如航太、國防、電信）對「行政/政治距離」極度敏感；易腐爛或低價值/高重量的產品（如水泥、玻璃）對「地理距離」極度敏感；而勞力密集產業則最關注「經濟距離」。",
m2_cards:[
  {title:"文化距離 (Cultural)",desc:"Google 與 eBay 等美國網路巨頭在中國與日本市場受挫，很大程度上是因為無法適應當地獨特的文化習慣、使用者介面偏好與社會關係網絡。"},
  {title:"行政/政治距離 (Administrative)",desc:"為何西班牙最大的電信商 Telefonica 主要向拉丁美洲擴張？因為雙方享有共同的語言與相似的行政體系（前殖民地連結），大幅降低了政治與法規風險。"},
  {title:"地理距離 (Geographic)",desc:"地理距離不僅是公里數，還包含基礎設施的連結。例如加拿大與美國因為地理相連且基礎設施高度整合，兩國間的貿易量極大。"},
  {title:"經濟距離 (Economic)",desc:"Walmart 在開發中國家擴張時經常遇到困難，因為其依賴強大 IT 基礎設施與高效率物流的商業模式（適合高經濟發展國家），在基礎設施落後的國家難以發揮。"}
],
m2_terms:[
  {front:"CAGE Framework\nCAGE 距離架構",back:"Ghemawat 提出的框架，透過文化、行政、地理、經濟四個維度，衡量兩國之間的差異與跨國經營的摩擦力。"},
  {front:"Cultural Distance\n文化距離",back:"兩國在語言、宗教、社會規範與消費者偏好上的差異。對具有文化意涵的產品（如食品、娛樂）影響最大。"},
  {front:"Psychic Distance\n心理距離",back:"決策者主觀感知上的市場差異。有時實體距離不遠，但心理距離極大，導致決策者嚴重誤判市場。"}
],
m2_q:[
  {q:"Ghemawat 的 CAGE 架構中，'C' 代表什麼？",opts:["Capital (資本)","Cost (成本)","Cultural (文化)","Communication (通訊)"],ans:2,exp:"CAGE 代表 Cultural (文化), Administrative (行政), Geographic (地理), Economic (經濟)。"},
  {q:"對於「水泥」或「玻璃」這類低價值但重量極大的產品，哪一種 CAGE 距離對其影響最致命？",opts:["文化距離","行政距離","地理距離","經濟距離"],ans:2,exp:"重量大、體積大且價值低的產品，其運輸成本極高，因此對「實體地理距離」最為敏感。"},
  {q:"英國企業向澳洲擴張的阻力，遠小於向地理位置更近的法國擴張。這最能用 CAGE 中的哪兩個維度來解釋？",opts:["地理與經濟距離","文化與行政距離 (同文同種與大英國協的制度連結)","氣候與時區差異","成本與利潤"],ans:1,exp:"英澳享有共同語言與相似的法律體系（文化與行政距離極短），抵銷了實體地理距離的遙遠。"},
  {q:"跨國企業在發展中國家常面臨腐敗、繁瑣的法規與外資限制，這反映了哪一種距離？",opts:["文化距離","行政/政治距離","地理距離","經濟距離"],ans:1,exp:"政府法規、制度透明度、政治敵意等體制上的差異，皆屬於行政/政治距離 (Administrative Distance)。"},
  {q:"在 CAGE 架構中，如果兩國存在殖民歷史連結（如葡萄牙與墨西哥），會產生什麼影響？",opts:["增加經濟距離","縮短行政與文化距離，促進雙邊貿易","沒有任何影響","增加地理距離"],ans:1,exp:"殖民歷史通常會留下共同的語言、相似的法律體系與文化習慣，大幅降低跨國交易的摩擦成本。"},
  {q:"麥當勞在印度市場推出「無牛肉、無豬肉」的素食漢堡，主要是為了解決哪一種距離帶來的挑戰？",opts:["文化距離 (宗教與飲食禁忌)","行政距離","地理距離","經濟距離"],ans:0,exp:"飲食習慣深受當地宗教與社會價值觀影響，這是最典型的文化距離挑戰。"},
  {q:"企業為何容易陷入「忽略 CAGE 距離」的陷阱？",opts:["因為他們討厭看地圖","因為他們過度專注於市場規模 (如 GDP、人口數)，而低估了隱性的制度與文化摩擦成本","因為當地政府禁止分析","因為 CAGE 架構太複雜"],ans:1,exp:"許多企業只看到「中國有 14 億人口」或「印度市場很大」，卻忽視了當地複雜的政經與文化差異，導致投資慘敗。"},
  {q:"勞力密集的成衣製造業，在跨國供應鏈佈局時，最關注的是哪一種距離（以尋求最低勞工成本）？",opts:["文化距離","行政距離","地理距離","經濟距離 (人均收入與工資的落差)"],ans:3,exp:"尋求效率的產業最關注經濟距離，即兩國在工資水平、要素成本上的巨大落差。"}
],

m3_nav:"3. 進入模式",m3_title:"進入模式的選擇 (Modes of Entry)",
m3_p1:"決定進入海外市場後，企業必須選擇「進入模式」(Modes of Entry)。這本質上是在「資源承諾/風險」與「控制程度」之間進行權衡 (Trade-off)。",
m3_p2:"光譜的最左端是出口 (Exporting) 與授權 (Licensing) / 加盟 (Franchising)。這些模式投入資金少、風險低，但也缺乏對當地市場的控制權，且可能面臨代理問題或技術外流。例如授權商可能為了自身短期利益，損害了母公司的品牌聲譽。",
m3_p3:"光譜的中間是合資 (Joint Ventures, JV) 與策略聯盟 (Strategic Alliances)。企業與當地夥伴共享風險與利潤，這能快速獲取當地知識與通路，或滿足當地政府的外資限制法規。但缺點是可能產生決策僵局，或是在合作過程中被夥伴「掏空」核心技術。",
m3_p4:"光譜的最右端是 100% 持股的獨資子公司 (Wholly Owned Subsidiaries)。企業享有絕對的控制權，能保護核心專利，並整合全球策略。然而，獨資伴隨著最高的資本投入與風險。獨資可分為兩種路徑：綠地投資 (Greenfield Investment，從零開始建廠，進度慢但文化純粹) 與跨國併購 (Acquisition，快速取得現成市佔與資產，但整合困難)。",
m3_cards:[
  {title:"出口 (Exporting)",desc:"最安全的試水溫方式。避免了在當地設立工廠的固定成本，但面臨高昂運輸成本、關稅障礙，且難以即時回應當地客戶需求。"},
  {title:"授權 (Licensing)",desc:"將無形資產（專利、商標）授權給國外廠商生產。優點是無風險獲取權利金；致命缺點是可能培養出未來的競爭對手。"},
  {title:"合資 (Joint Ventures)",desc:"在中國市場極為常見，因為政府常規定外資必須與本土企業合資（如早期的汽車業）。這降低了政治風險並能利用本土網絡。"},
  {title:"綠地 vs. 併購",desc:"綠地投資 (Greenfield) 就像自己生小孩，雖然慢，但不會有排斥反應；併購 (Acquisition) 就像領養，立刻有即戰力，但可能面臨嚴重的組織文化衝突。"}
],
m3_terms:[
  {front:"Foreign Direct Investment (FDI)\n外人直接投資",back:"企業跨越國界，對海外的實體資產或企業進行具有實質控制權的投資（包含合資與獨資子公司）。"},
  {front:"Greenfield Investment\n綠地投資",back:"FDI 的一種形式。企業在海外從購買土地開始，完全從零建立新的營運設施。"},
  {front:"Wholly Owned Subsidiary\n獨資子公司",back:"企業擁有 100% 股權的海外分支機構，承擔最高風險，但也享有最完整的控制權與技術保護。"}
],
m3_q:[
  {q:"企業在選擇海外市場進入模式時，最核心的權衡 (Trade-off) 是什麼？",opts:["產品價格與數量的權衡","「資源承諾/風險」與「控制程度」的權衡","員工薪資與工時的權衡","廣告預算與利潤的權衡"],ans:1,exp:"高控制權（如獨資）必然伴隨高資本投入與高風險；低風險模式（如出口）則必然缺乏對海外市場的控制力。"},
  {q:"下列哪一種進入模式的「資源承諾最小」且「風險最低」？",opts:["獨資子公司 (Wholly Owned Subsidiary)","合資 (Joint Venture)","出口 (Exporting)","綠地投資 (Greenfield)"],ans:2,exp:"出口不需要在海外投資建廠或建立龐大的銷售團隊，是風險最低的進入方式。"},
  {q:"「授權」(Licensing) 作為市場進入模式，最大的隱憂是什麼？",opts:["運輸成本太高","可能導致核心技術外流，不經意間培養出未來的競爭對手","需要投入極高的資本建廠","受限於關稅障礙"],ans:1,exp:"被授權方學會技術後，若合約結束或違約，可能直接成為母公司的強勁對手。"},
  {q:"為何許多跨國企業進入中國或印度等新興市場時，常選擇「合資」(Joint Venture)？",opts:["因為合資可以獲得 100% 控制權","為了獲取當地夥伴的政商關係、通路網絡，或滿足當地政府的外資限制法規","因為不需要分享利潤","因為這樣可以避免繳稅"],ans:1,exp:"合資能有效克服外來者劣勢，並符合部分發展中國家對外資持股比例的法規限制。"},
  {q:"企業在海外「從零開始購買土地、建造工廠並招募員工」，這屬於哪一種投資方式？",opts:["跨國併購 (Acquisition)","綠地投資 (Greenfield Investment)","間接出口","授權"],ans:1,exp:"Greenfield 意指在「未開發的綠地」上從頭建起，進度較慢，但能完全按母公司標準建立文化與流程。"},
  {q:"相較於綠地投資，「跨國併購」(Acquisition) 的最大優點是什麼？",opts:["完全沒有組織文化衝突","能極快速地取得當地的市佔率、品牌與現成資產","不需要花費任何資金","政府絕對不會審查"],ans:1,exp:"併購能立刻買下時間與市佔，但後續的文化整合與人員留任往往是最大的挑戰。"},
  {q:"若一家科技公司擁有極度機密且容易被偷竊的核心技術，它應該選擇哪種進入模式？",opts:["廣泛授權給當地廠商","100% 獨資子公司 (Wholly Owned Subsidiary)","少數股權合資","間接出口"],ans:1,exp:"當技術外溢風險極高時，企業必須選擇獨資以保持絕對控制權，防止技術被外部合作夥伴竊取。"},
  {q:"企業將商標、SOP 與行銷資源授權給海外獨立店長經營，這是哪種模式？",opts:["合資","綠地投資","加盟 (Franchising)","外人直接投資"],ans:2,exp:"加盟常見於服務業（如速食店、飯店），加盟主出資經營，母公司收取權利金並進行品質控管。"}
],

m4_nav:"4. 全球策略與組織",m4_title:"全球策略與組織：I-R 架構與 AAA 三角",
m4_p1:"跨國企業在進行全球營運時，面臨兩股相互拉扯的力量：(1) 降低成本的需求，驅使企業追求「全球整合」(Global Integration) 與標準化規模經濟；(2) 滿足各地差異的需求，驅使企業追求「在地回應」(Local Responsiveness) 與客製化。這構成了 Bartlett & Ghoshal 著名的「整合-回應架構」(I-R Framework)。",
m4_p2:"依據這兩股力量的強弱，跨國策略可分為四種：(1) 國際策略 (International)：將母國的核心能力/產品直接轉移至海外（低整合、低回應）。(2) 多國本土化策略 (Multidomestic)：賦予各地分公司極大自主權，高度客製化產品以迎合當地市場（低整合、高回應）。(3) 全球化策略 (Global)：將全球視為單一市場，推出標準化產品以追求極致成本效率（高整合、低回應）。(4) 跨國型策略 (Transnational)：同時追求全球效率與在地回應，透過複雜的全球網絡共享知識（高整合、高回應）。",
m4_p3:"此外，Pankaj Ghemawat 提出了「AAA 三角策略」(AAA Triangle)：企業在跨國擴張時，可選擇 Adaptation (調適，即在地回應)、Aggregation (聚合，即全球規模經濟)、或 Arbitrage (套利，利用各國要素成本差異，如在印度設客服中心)。",
m4_p4:"「多數企業沒有足夠的管理頻寬同時執行三個 A。專注於一個或兩個 A，並在組織結構上予以支持，才是致勝之道。」—— Ghemawat",
m4_cards:[
  {title:"多國本土化 (Multidomestic)",desc:"如早期的聯合利華 (Unilever) 或 MTV。各地區分公司就像獨立的小國王，產品配方、行銷完全在地化。缺點是成本高昂，且難以發揮全球規模經濟。"},
  {title:"全球化策略 (Global)",desc:"如 Intel 或波音 (Boeing)。微處理器或客機在全球各地的需求幾乎一致。企業在成本最低處集中生產，向全球銷售標準化產品。"},
  {title:"跨國型策略 (Transnational)",desc:"被視為跨國企業的聖杯。既要有全球化的低成本，又要有本土化的彈性。如 Caterpillar 研發共用引擎核心，但依據各國地形與法規微調外部配備。"},
  {title:"套利 (Arbitrage)",desc:"利用國與國之間的差異（而非克服差異）來獲利。最典型的是「勞動力套利」，如將客服設在菲律賓或將軟體開發設在印度。"}
],
m4_terms:[
  {front:"Integration-Responsiveness Framework\nI-R 架構",back:"分析跨國企業如何在「全球整合（追求規模經濟）」與「在地回應（滿足各國差異）」這兩股力量間取得平衡的矩陣。"},
  {front:"Transnational Strategy\n跨國型策略",back:"I-R 矩陣中最複雜的策略，試圖同時最大化全球效率、在地適應力與跨國知識學習。通常採用矩陣式組織結構。"},
  {front:"AAA Triangle\nAAA 三角策略",back:"Ghemawat 提出的跨國策略框架：Adaptation (調適/在地化)、Aggregation (聚合/規模化)、Arbitrage (套利/利用差異)。"}
],
m4_q:[
  {q:"在 I-R 架構中，促使企業追求「全球整合」(Global Integration) 的主要驅動力為何？",opts:["消費者偏好的巨大差異","地主國政府的要求","追求規模經濟與降低成本的壓力","希望增加管理的複雜度"],ans:2,exp:"面對激烈的價格競爭，企業必須透過標準化生產與集中研發來降低全球總成本。"},
  {q:"企業賦予各地海外分公司極大的決策自主權，讓他們根據當地口味大幅修改產品。這屬於哪種策略？",opts:["多國本土化策略 (Multidomestic Strategy)","全球化策略 (Global Strategy)","國際策略 (International Strategy)","套利策略 (Arbitrage)"],ans:0,exp:"多國本土化策略（高在地回應、低全球整合）將各國視為獨立市場，分公司猶如當地企業。"},
  {q:"「全球化策略」(Global Strategy) 的典型特徵為何？",opts:["每個國家賣完全不同的產品","將全球視為單一市場，集中生產標準化產品以追求極致的成本效率","將總部遷往海外","完全依賴當地經銷商"],ans:1,exp:"如民航機或半導體產業，各國需求同質性高，企業在成本最低的少數據點生產全球統一標準的產品。"},
  {q:"跨國型策略 (Transnational Strategy) 被認為是最難執行的，原因為何？",opts:["因為它不需要任何資源","因為它試圖同時達成「高全球整合」與「高在地回應」這兩個互相矛盾的目標","因為它被國際法禁止","因為它只適用於單一國家"],ans:1,exp:"同時追求標準化（降成本）與客製化（滿足差異），需要極為複雜的矩陣型組織與跨國知識分享網路。"},
  {q:"Ghemawat 的 AAA 三角中，企業利用各國工資或稅率的落差來獲利（如將客服移至印度），屬於哪一個 A？",opts:["Adaptation (調適)","Aggregation (聚合)","Arbitrage (套利)","Alliance (聯盟)"],ans:2,exp:"Arbitrage (套利) 的核心思想是「利用」國與國之間的經濟或法規差異來創造優勢，而非「克服」差異。"},
  {q:"如果產業的特性是「各國消費者需求差異極小，但價格競爭極度激烈」，企業應採取何種策略？",opts:["多國本土化策略","全球化策略 (Global Strategy)","完全撤出國際市場","只在母國生產並提高價格"],ans:1,exp:"需求差異小代表不需要高「在地回應」；價格競爭激烈代表需要高「全球整合」以壓低成本。此為標準的全球化策略情境。"},
  {q:"在 AAA 策略中，克服「文化距離」最常使用的是哪一個策略？",opts:["Adaptation (調適)","Aggregation (聚合)","Arbitrage (套利)","以上皆非"],ans:0,exp:"Adaptation (調適) 就是透過產品或行銷的在地化修改，來適應並克服各國文化與法規上的差異。"},
  {q:"早期美國企業將產品在國內研發與生產，然後直接賣到國外，完全不考慮修改產品或海外生產。這屬於 I-R 矩陣中的哪種策略？",opts:["國際策略 (International Strategy)","跨國型策略 (Transnational Strategy)","多國本土化策略","全球化策略"],ans:0,exp:"國際策略（低整合、低回應）僅僅是將母國的產品與創新，簡單地轉移至缺乏此技術的海外市場。"}
],

m1_nav:"1. Motives & Advantage",m1_title:"National Advantage & Internationalization Motives",
m1_p1:"Traditional motives for going global are Market-seeking and Resource-seeking. However, in the modern global economy, Efficiency-seeking (e.g., global supply chain fragmentation) and Strategic asset-seeking (e.g., acquiring a Silicon Valley AI startup for tech) are equally important.",
m1_p2:"\"Why does a nation become the home base for successful international competitors in an industry? It is formed by the national environment.\" — Michael Porter",
m1_p3:"To explain how national environments confer advantage, Michael Porter introduced the 'National Diamond Model'. It consists of four interacting attributes: (1) Factor conditions: specialized talent or infrastructure; (2) Demand conditions: demanding domestic buyers push firms to innovate; (3) Related and supporting industries: strong clusters provide synergy; (4) Firm strategy, structure, and rivalry: intense domestic competition breeds international strength.",
m1_p4:"Cross-border expansion is essentially combining 'Ownership advantages' (patents, brands nurtured at home) with 'Location advantages' (cheap labor, huge markets in the host country) to create value beyond local competitors.",
m1_cards:[
  {title:"Market-seeking",desc:"When domestic markets are saturated/small, firms must push products overseas to amortize massive fixed/R&D costs. E.g., Switzerland's Nestlé heavily relies on foreign markets."},
  {title:"Efficiency-seeking",desc:"Firms locate different value chain activities where costs are lowest or efficiency is highest globally. E.g., Apple keeping design in California but moving assembly to China/India."},
  {title:"Porter's 'Demand Conditions'",desc:"Japanese consumers are extremely demanding regarding electronics and miniaturization. This harsh domestic demand forced Sony and Panasonic to develop world-leading miniaturization tech."},
  {title:"Crucible of Domestic Rivalry",desc:"The brutal domestic competition among German automakers (Mercedes, BMW, Audi, VW) forged their global dominance. Iron sharpens iron."}
],
m1_terms:[
  {front:"Liability of Foreignness",back:"The inherent disadvantage and extra costs foreign firms face in host countries due to unfamiliarity with local culture/laws and xenophobic consumer attitudes."},
  {front:"National Diamond Model",back:"Porter's framework explaining national competitive advantage through the interaction of factor conditions, demand conditions, supporting industries, and firm rivalry."},
  {front:"Location Advantages",back:"Advantages specific to a country or region that lower production costs or add value, such as natural resources, cheap labor, or tax incentives."}
],
m1_q:[
  {q:"Acquiring an AI startup in Silicon Valley primarily falls under which internationalization motive?",opts:["Market-seeking","Resource-seeking","Efficiency-seeking","Strategic asset-seeking"],ans:3,exp:"Investing abroad specifically to acquire advanced tech, brands, or unique organizational capabilities is strategic asset-seeking."},
  {q:"According to Porter's Diamond Model, which is a positive factor for a firm's global competitiveness?",opts:["Government protecting firms from all competition","Highly demanding and sophisticated domestic consumers","Lack of domestic suppliers","Extreme scarcity of all resources"],ans:1,exp:"Demanding domestic buyers (Demand Conditions) force firms to continuously innovate and improve quality, making them globally competitive."},
  {q:"The 'Liability of Foreignness' refers to:",opts:["The extra operational and adaptation costs foreign firms face compared to local firms","Foreign firms not having to pay taxes","Poor foreign language skills","Being discriminated against in the home country"],ans:0,exp:"Foreign firms suffer from unfamiliarity with host country regulations, culture, and networks, generating additional learning costs."},
  {q:"Germany's auto industry has a powerful cluster of component suppliers (e.g., Bosch). This relates to which Diamond Model element?",opts:["Factor conditions","Demand conditions","Related and supporting industries","Domestic rivalry"],ans:2,exp:"Strong upstream/downstream suppliers (Related & Supporting Industries) provide innovation and high-quality components, strengthening the core industry."},
  {q:"Nike moving shoe manufacturing to Asian countries is primarily motivated by?",opts:["Market-seeking","Efficiency-seeking (pursuing lowest cost locations)","Strategic asset-seeking","Government mandates"],ans:1,exp:"Moving labor-intensive value chain activities to countries with lower wages is a classic efficiency-seeking motive."},
  {q:"'Ownership advantages' refer to:",opts:["The firm owning land abroad","The firm possessing unique patents, brands, or management techniques to overcome the liability of foreignness","Government-granted privileges","100% insider stock ownership"],ans:1,exp:"Ownership advantages are the core weapons MNCs rely on to compete overseas and offset their unfamiliarity with the local market."},
  {q:"In Porter's Diamond, how does intense domestic rivalry affect firms?",opts:["Weakens their international competitiveness","Forces continuous improvement and innovation, thereby strengthening international competitiveness","Causes bankruptcy","No effect"],ans:1,exp:"Brutal domestic competition is the strongest training ground. Firms that survive domestically are usually formidable internationally."},
  {q:"If a country lacks basic infrastructure but the government heavily invests in training high-end engineers, this improves which Diamond element?",opts:["Demand conditions","Basic factor conditions","Advanced Factor Conditions","Related industries"],ans:2,exp:"Porter emphasizes that 'advanced and specialized factor conditions' like top-tier talent and research institutes have far more strategic importance than natural resources."}
],

m2_nav:"2. Evaluating Markets",m2_title:"Evaluating Markets: The CAGE Distance Framework",
m2_p1:"When evaluating foreign markets, firms often over-rely on hard economic metrics like 'GDP' or 'population', ignoring the true friction of cross-border operations. Pankaj Ghemawat points out that 'distance' is not just geographic; it is multidimensional.",
m2_p2:"\"Distance still matters. We are not living in a borderless world. Companies that ignore distance when expanding abroad will pay a heavy price.\" — Pankaj Ghemawat",
m2_p3:"Ghemawat proposed the 'CAGE Distance Framework' to comprehensively assess bilateral market differences: (1) Cultural Distance: differences in language, religion, values, and social norms. (2) Administrative/Political Distance: lack of colonial ties, no shared currency, political hostility, or protectionist laws. (3) Geographic Distance: physical distance, lack of land borders, no direct flights, or climate differences. (4) Economic Distance: gaps in per capita income, infrastructure quality, and labor costs.",
m2_p4:"Different industries are sensitive to different distances. E.g., Food and media are extremely sensitive to 'Cultural distance'. Highly regulated industries (aerospace, telecom) are sensitive to 'Administrative distance'. Perishable or low-value/high-weight goods (cement) are sensitive to 'Geographic distance'. Labor-intensive industries focus most on 'Economic distance'.",
m2_cards:[
  {title:"Cultural Distance",desc:"US tech giants like Google and eBay stumbled in China and Japan largely because they failed to adapt to unique cultural habits, UI preferences, and social networks."},
  {title:"Administrative Distance",desc:"Why did Spain's telecom giant Telefonica expand primarily into Latin America? Because shared language and similar administrative systems (colonial ties) drastically reduced political/regulatory risks."},
  {title:"Geographic Distance",desc:"It's not just kilometers, but infrastructure connectivity. E.g., Trade between Canada and the US is massive because they share a border and highly integrated infrastructure."},
  {title:"Economic Distance",desc:"Walmart often struggles in developing countries because its business model relies on robust IT and high-efficiency logistics (suited for high economic development), which fail in countries with poor infrastructure."}
],
m2_terms:[
  {front:"CAGE Framework",back:"Ghemawat's framework measuring bilateral friction and differences through four dimensions: Cultural, Administrative, Geographic, and Economic distances."},
  {front:"Cultural Distance",back:"Differences in language, religion, social norms, and consumer preferences. Impacts culturally resonant products (food, entertainment) the most."},
  {front:"Psychic Distance",back:"The perceived distance by decision-makers. Sometimes physical distance is short, but psychic distance is vast, leading to severe market misjudgments."}
],
m2_q:[
  {q:"In Ghemawat's CAGE framework, what does 'C' stand for?",opts:["Capital","Cost","Cultural","Communication"],ans:2,exp:"CAGE stands for Cultural, Administrative, Geographic, Economic."},
  {q:"For low-value, high-weight products like 'cement', which CAGE distance is most fatal?",opts:["Cultural","Administrative","Geographic","Economic"],ans:2,exp:"Heavy, bulky, low-value goods have exorbitant transport costs, making them extremely sensitive to physical Geographic distance."},
  {q:"A UK firm faces less resistance expanding to Australia than to nearby France. Which CAGE dimensions best explain this?",opts:["Geographic & Economic","Cultural & Administrative (Shared language and Commonwealth institutional ties)","Climate & Timezone","Cost & Profit"],ans:1,exp:"Shared language and similar legal systems (short Cultural/Admin distances) offset the vast physical Geographic distance."},
  {q:"MNCs facing corruption, red tape, and foreign ownership limits in developing countries reflect which distance?",opts:["Cultural","Administrative/Political","Geographic","Economic"],ans:1,exp:"Differences in government regulations, institutional transparency, and political hostility fall under Administrative/Political Distance."},
  {q:"In the CAGE framework, if two countries share colonial ties (e.g., Portugal & Brazil), what is the impact?",opts:["Increases economic distance","Shortens administrative and cultural distance, boosting bilateral trade","No effect","Increases geographic distance"],ans:1,exp:"Colonial ties usually leave shared languages, similar legal systems, and cultural habits, drastically lowering transaction frictions."},
  {q:"McDonald's launching 'no beef, no pork' burgers in India primarily addresses challenges from which distance?",opts:["Cultural distance (religion and dietary taboos)","Administrative distance","Geographic distance","Economic distance"],ans:0,exp:"Dietary habits are deeply rooted in religion and social values—a classic Cultural Distance challenge."},
  {q:"Why do firms often fall into the trap of 'ignoring CAGE distances'?",opts:["They hate maps","They over-focus on market size (GDP, population) and underestimate hidden institutional and cultural friction costs","Governments ban analysis","CAGE is too complex"],ans:1,exp:"Firms see '1.4 billion people in China' but ignore the complex political, economic, and cultural differences, leading to investment disasters."},
  {q:"When labor-intensive apparel manufacturing seeks global supply chain locations, which distance is it most concerned with (to find lowest labor costs)?",opts:["Cultural","Administrative","Geographic","Economic distance (gaps in per capita income and wages)"],ans:3,exp:"Efficiency-seeking industries care most about Economic distance—specifically, the massive gaps in wages and factor costs between countries."}
],

m3_nav:"3. Modes of Entry",m3_title:"Modes of Entry",
m3_p1:"Once a foreign market is selected, a firm must choose a 'Mode of Entry'. This is fundamentally a trade-off between 'Resource Commitment / Risk' and 'Degree of Control'.",
m3_p2:"On the far left of the spectrum are Exporting and Licensing / Franchising. These require low capital and carry low risk, but offer poor control over the local market and face risks of agency problems or technology leakage. E.g., a licensee might ruin the parent brand's reputation for short-term profit.",
m3_p3:"In the middle are Joint Ventures (JV) and Strategic Alliances. Firms share risk and profit with a local partner, rapidly gaining local knowledge and distribution, or satisfying local government foreign-ownership limits. Drawbacks include potential decision gridlock or having core tech 'hollowed out' by the partner.",
m3_p4:"On the far right are 100% Wholly Owned Subsidiaries. The firm enjoys absolute control, protects core patents, and integrates global strategy seamlessly. However, this carries the highest capital commitment and risk. Sub-paths include Greenfield Investment (building from scratch; slow but culturally pure) and Acquisition (buying instant market share and assets, but facing tough integration).",
m3_cards:[
  {title:"Exporting",desc:"The safest way to test the waters. Avoids the fixed costs of building local plants, but faces high transport costs, tariff barriers, and poor local responsiveness."},
  {title:"Licensing",desc:"Granting rights to intangible assets (patents, trademarks) to a foreign firm for a royalty. Pro: risk-free income. Con: potentially breeding a future competitor."},
  {title:"Joint Ventures",desc:"Extremely common in China, where the government often mandates foreign firms partner with local ones (e.g., early auto industry). Lowers political risk and leverages local networks."},
  {title:"Greenfield vs. Acquisition",desc:"Greenfield is like having your own baby: slow to grow, but no rejection. Acquisition is like adoption: instant capabilities, but severe organizational culture clashes."}
],
m3_terms:[
  {front:"Foreign Direct Investment (FDI)",back:"A firm crossing borders to invest in and maintain substantial control over foreign physical assets or enterprises (includes JVs and wholly owned subsidiaries)."},
  {front:"Greenfield Investment",back:"A form of FDI where a firm builds new operational facilities from the ground up in a foreign country."},
  {front:"Wholly Owned Subsidiary",back:"A foreign branch where the parent firm owns 100% of the equity, bearing maximum risk but retaining absolute control and tech protection."}
],
m3_q:[
  {q:"What is the core trade-off when selecting a foreign market entry mode?",opts:["Product price vs quantity","'Resource Commitment / Risk' vs 'Degree of Control'","Employee wages vs working hours","Ad budget vs profit"],ans:1,exp:"High control (e.g., wholly owned) always comes with high capital commitment and risk; low risk modes (e.g., export) lack market control."},
  {q:"Which entry mode has the 'lowest resource commitment' and 'lowest risk'?",opts:["Wholly Owned Subsidiary","Joint Venture","Exporting","Greenfield"],ans:2,exp:"Exporting requires no overseas plant investment or massive sales teams, making it the lowest-risk entry method."},
  {q:"What is the biggest hidden danger of 'Licensing' as an entry mode?",opts:["Transport costs are too high","May leak core tech, inadvertently breeding a future competitor","Requires massive capital to build plants","Restricted by tariffs"],ans:1,exp:"Once the licensee masters the tech, if the contract ends or is breached, they can become a formidable rival to the parent firm."},
  {q:"Why do MNCs often choose 'Joint Ventures' (JVs) when entering emerging markets like China or India?",opts:["To gain 100% control","To acquire the local partner's political connections/channels, or to satisfy local government foreign-ownership restrictions","Because they don't have to share profits","To evade taxes"],ans:1,exp:"JVs effectively overcome the liability of foreignness and comply with developing nations' legal restrictions on foreign ownership."},
  {q:"'Buying land, building a factory, and hiring staff from scratch' overseas describes which investment mode?",opts:["Acquisition","Greenfield Investment","Indirect Export","Licensing"],ans:1,exp:"Greenfield means building from scratch on an 'undeveloped green field'. Slower, but allows perfect replication of parent culture and processes."},
  {q:"Compared to Greenfield, what is the biggest advantage of 'Acquisition'?",opts:["Zero organizational culture clash","Extremely rapid acquisition of local market share, brands, and existing assets","Costs no money","Government never reviews it"],ans:1,exp:"Acquisitions buy time and market share instantly, but post-merger cultural integration and talent retention are massive challenges."},
  {q:"If a tech firm has highly secretive core tech that is easily stolen, which entry mode should it choose?",opts:["Broad licensing to local firms","100% Wholly Owned Subsidiary","Minority JV","Indirect export"],ans:1,exp:"When tech spillover risk is critical, firms must choose wholly owned subsidiaries to maintain absolute control and prevent partner theft."},
  {q:"Authorizing an independent overseas operator to use trademarks, SOPs, and marketing resources describes which mode?",opts:["Joint Venture","Greenfield","Franchising","FDI"],ans:2,exp:"Common in services (fast food, hotels). The franchisee invests capital and runs it; the parent collects royalties and controls quality."}
],

m4_nav:"4. Global Strategy & Org",m4_title:"Global Strategy & Organization: I-R Framework & AAA Triangle",
m4_p1:"When operating globally, MNCs face two conflicting forces: (1) The need to reduce costs, driving the pursuit of 'Global Integration' and standardized scale economies; (2) The need to satisfy local differences, driving 'Local Responsiveness' and customization. This forms Bartlett & Ghoshal's famous 'Integration-Responsiveness (I-R) Framework'.",
m4_p2:"Based on these two forces, transnational strategies divide into four types: (1) International: transfer parent core competencies/products directly abroad (Low Int, Low Resp). (2) Multidomestic: grant high autonomy to local subsidiaries to heavily customize products (Low Int, High Resp). (3) Global: treat the world as a single market, producing standardized goods for maximum efficiency (High Int, Low Resp). (4) Transnational: simultaneously pursue global efficiency and local responsiveness, sharing knowledge via complex global networks (High Int, High Resp).",
m4_p3:"Additionally, Pankaj Ghemawat proposed the 'AAA Triangle': when expanding, firms can choose Adaptation (local responsiveness), Aggregation (global scale economies), or Arbitrage (exploiting cross-border factor cost differences, e.g., call centers in India).",
m4_p4:"\"Most companies lack the managerial bandwidth to execute all three A's simultaneously. Focusing on one or two A's, supported by the right organizational structure, is the path to winning.\" — Ghemawat",
m4_cards:[
  {title:"Multidomestic",desc:"E.g., early Unilever or MTV. Local subsidiaries act like independent kingdoms; product formulas and marketing are entirely localized. Drawback: high costs, unable to leverage global scale."},
  {title:"Global Strategy",desc:"E.g., Intel or Boeing. Demand for microprocessors or jets is identical worldwide. Firms concentrate production in lowest-cost hubs and sell standardized products globally."},
  {title:"Transnational",desc:"The holy grail of MNCs. Requires global low costs plus local flexibility. E.g., Caterpillar shares core engine R&D globally but tweaks external attachments based on local terrain and laws."},
  {title:"Arbitrage",desc:"Profiting by exploiting (rather than overcoming) differences between countries. Most typical is 'labor arbitrage', like offshoring software dev to India or call centers to the Philippines."}
],
m4_terms:[
  {front:"I-R Framework",back:"Integration-Responsiveness Framework. A matrix analyzing how MNCs balance 'Global Integration (scale economies)' and 'Local Responsiveness (meeting local differences)'."},
  {front:"Transnational Strategy",back:"The most complex strategy in the I-R matrix, attempting to simultaneously maximize global efficiency, local adaptability, and cross-border learning. Usually uses a matrix org structure."},
  {front:"AAA Triangle",back:"Ghemawat's global strategy framework: Adaptation (localization), Aggregation (scale), and Arbitrage (exploiting differences)."}
],
m4_q:[
  {q:"In the I-R framework, what is the primary driver for 'Global Integration'?",opts:["Huge differences in consumer preferences","Host government demands","Pressure to pursue scale economies and reduce costs","Desire to increase management complexity"],ans:2,exp:"Facing intense price competition, firms must lower global total costs through standardized production and centralized R&D."},
  {q:"Giving overseas subsidiaries immense autonomy to drastically modify products for local tastes belongs to which strategy?",opts:["Multidomestic Strategy","Global Strategy","International Strategy","Arbitrage Strategy"],ans:0,exp:"Multidomestic (High local response, Low global integration) treats each country as an independent market, acting like a local firm."},
  {q:"What is a typical characteristic of a 'Global Strategy'?",opts:["Selling completely different products in every country","Treating the world as a single market, centralizing production of standardized goods for ultimate cost efficiency","Moving HQ overseas","Relying entirely on local distributors"],ans:1,exp:"Like commercial jets or semiconductors, demand is homogeneous. Firms produce globally standardized goods in a few low-cost hubs."},
  {q:"Why is the 'Transnational Strategy' considered the hardest to execute?",opts:["Because it requires no resources","Because it attempts to simultaneously achieve 'High Global Integration' and 'High Local Responsiveness', which are contradictory goals","Because it violates international law","Because it only applies to one country"],ans:1,exp:"Simultaneously pursuing standardization (cutting costs) and customization (meeting differences) requires highly complex matrix organizations and knowledge networks."},
  {q:"In Ghemawat's AAA Triangle, profiting from wage or tax gaps between countries (e.g., moving call centers to India) belongs to which 'A'?",opts:["Adaptation","Aggregation","Arbitrage","Alliance"],ans:2,exp:"Arbitrage focuses on 'exploiting' economic or regulatory differences between countries to create an advantage, rather than 'overcoming' them."},
  {q:"If an industry is characterized by 'minimal consumer demand differences globally, but extreme price competition', which strategy is best?",opts:["Multidomestic","Global Strategy","Withdraw from international markets","Produce only at home and raise prices"],ans:1,exp:"Small demand differences mean low need for 'Local Responsiveness'; fierce price competition means high need for 'Global Integration'. This mandates a Global Strategy."},
  {q:"In the AAA strategy, which 'A' is most commonly used to overcome 'Cultural Distance'?",opts:["Adaptation","Aggregation","Arbitrage","None of the above"],ans:0,exp:"Adaptation involves modifying products or marketing locally to suit and overcome cultural and regulatory differences in each country."},
  {q:"Early US firms developing/producing at home and exporting directly without modifying products. Which I-R strategy is this?",opts:["International Strategy","Transnational Strategy","Multidomestic","Global Strategy"],ans:0,exp:"International Strategy (Low Int, Low Resp) simply transfers parent company products/innovations directly to foreign markets lacking that tech."}
],

/* ═══════ MODULE QUIZ ═══════ */
const ModuleQuiz = ({ questions, t, moduleId, onQuizSubmit }) => {
  const [selected, setSelected] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [quizIndices] = useState(() =>
    [...Array(questions.length).keys()].sort(() => Math.random() - 0.5).slice(0, 4)
  );
  return (
    <div className="mt-8 bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 select-none">
      <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-6 flex items-center"><IconBookOpen size={20} className="mr-2"/>{t.quiz_title}</h3>
      {quizIndices.map((qIdx, i) => {
        const q = questions[qIdx];
        return (
          <div key={qIdx} className="mb-6">
            <p className="font-bold mb-3 text-slate-800 dark:text-slate-200">{i+1}. {q.q}</p>
            <div className="space-y-2">
              {q.opts.map((opt, oIdx) => (
                <button key={oIdx} onClick={() => !submitted && setSelected(s => ({...s, [i]: oIdx}))}
                  className={`w-full text-left px-4 py-3 rounded-lg border transition-all text-sm
                    ${submitted
                      ? oIdx === q.ans ? 'bg-green-100 border-green-500 dark:bg-green-900/30 dark:border-green-500 font-bold'
                        : selected[i] === oIdx ? 'bg-red-100 border-red-400 dark:bg-red-900/30 dark:border-red-400 text-red-600' : 'border-slate-200 dark:border-slate-700'
                      : selected[i] === oIdx ? 'border-[#004030] dark:border-[#D8C3A5] bg-[#004030]/5 dark:bg-[#D8C3A5]/5 font-bold text-[#004030] dark:text-[#D8C3A5]' : 'border-slate-200 dark:border-slate-700 hover:border-slate-400'
                    } text-slate-700 dark:text-slate-300`}>
                  {opt}
                </button>
              ))}
            </div>
            {submitted && <p className="mt-2 text-sm text-slate-600 dark:text-slate-400 italic">{t.explanation}: {q.exp}</p>}
          </div>
        );
      })}
      {!submitted ? (
        <button onClick={() => { 
            setSubmitted(true); 
            const c = quizIndices.filter((qIdx,i) => selected[i] === questions[qIdx].ans).length; 
            onQuizSubmit(moduleId, c, quizIndices.length, questions.length); 
          }}
          disabled={Object.keys(selected).length < quizIndices.length}
          className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 transition-all">
          {t.submit}
        </button>
      ) : (
        <div className="flex items-center gap-4">
          <p className="font-bold text-[#004030] dark:text-[#D8C3A5]">{t.score}: {quizIndices.filter((qIdx,i) => selected[i] === questions[qIdx].ans).length}/{quizIndices.length}</p>
          <button onClick={() => { setSelected({}); setSubmitted(false); }}
            className="px-6 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold rounded-lg hover:bg-[#004030]/10 transition-colors">
            {t.retry}
          </button>
        </div>
      )}
    </div>
  );
};

// 1. CAGE Distance Calculator
const CAGELab = ({lang}) => {
  const [c, setC] = useState(50);
  const [a, setA] = useState(50);
  const [g, setG] = useState(50);
  const [e, setE] = useState(50);
  
  const score = Math.round((c+a+g+e)/4);
  let risk, color;
  if(score >= 75) { risk = lang==='zh'?'極高摩擦：建議審慎評估或放棄':'Extreme Friction: Caution/Abandon'; color = 'text-red-500'; }
  else if(score >= 40) { risk = lang==='zh'?'中度摩擦：需客製化與在地合資':'Moderate Friction: Needs Adaptation/JV'; color = 'text-yellow-600'; }
  else { risk = lang==='zh'?'低摩擦：適合直接進入/標準化':'Low Friction: Suitable for Direct Entry'; color = 'text-green-600'; }

  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 select-none">
      <h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-3">{lang==='zh'?'CAGE 距離評估器':'CAGE Distance Calculator'}</h4>
      <p className="text-xs text-slate-500 mb-4">{lang==='zh'?'評估目標市場與母國在四個維度上的差異，計算外來者劣勢。':'Assess differences in 4 dimensions to calculate Liability of Foreignness.'}</p>
      
      <div className="space-y-4">
        <div>
          <div className="flex justify-between text-xs font-bold mb-1">
            <span>C: {lang==='zh'?'文化距離 (語言/價值觀)':'Cultural (Language/Values)'}</span><span>{c}</span>
          </div>
          <input type="range" min="0" max="100" value={c} onChange={ev=>setC(+ev.target.value)} className="w-full accent-blue-500"/>
        </div>
        <div>
          <div className="flex justify-between text-xs font-bold mb-1">
            <span>A: {lang==='zh'?'行政距離 (政治/法規/無連結)':'Administrative (Politics/Laws)'}</span><span>{a}</span>
          </div>
          <input type="range" min="0" max="100" value={a} onChange={ev=>setA(+ev.target.value)} className="w-full accent-red-500"/>
        </div>
        <div>
          <div className="flex justify-between text-xs font-bold mb-1">
            <span>G: {lang==='zh'?'地理距離 (實體距離/缺乏直航)':'Geographic (Physical/Transport)'}</span><span>{g}</span>
          </div>
          <input type="range" min="0" max="100" value={g} onChange={ev=>setG(+ev.target.value)} className="w-full accent-green-500"/>
        </div>
        <div>
          <div className="flex justify-between text-xs font-bold mb-1">
            <span>E: {lang==='zh'?'經濟距離 (所得/基礎設施落差)':'Economic (Income/Infrastructure)'}</span><span>{e}</span>
          </div>
          <input type="range" min="0" max="100" value={e} onChange={ev=>setE(+ev.target.value)} className="w-full accent-orange-500"/>
        </div>
      </div>
      
      <div className="mt-5 p-4 bg-slate-50 dark:bg-slate-900 rounded-lg text-center border border-slate-200 dark:border-slate-700">
        <div className="text-xs text-slate-500 mb-1">{lang==='zh'?'外來者劣勢指數':'Liability of Foreignness Index'}</div>
        <div className={`text-2xl font-black ${color}`}>{score}/100</div>
        <div className={`text-xs mt-1 font-bold ${color}`}>{risk}</div>
      </div>
    </div>
  );
};

// 2. Entry Mode Selector
const EntryModeLab = ({lang}) => {
  const [control, setControl] = useState(50); // Desired Control
  const [commitment, setCommitment] = useState(50); // Resource Commitment / Risk Tolerance
  
  let mode, desc;
  if(control < 40 && commitment < 40) { 
    mode = lang==='zh'?'出口 / 授權 (Export / Licensing)':'Export / Licensing'; 
    desc = lang==='zh'?'極低風險，快速變現，但缺乏市場控制力與技術外洩風險。':'Very low risk, quick returns, but poor control and risk of tech leakage.'; 
  } else if (control >= 70 && commitment >= 70) {
    mode = lang==='zh'?'100% 獨資子公司 (Wholly Owned Subsidiary)':'Wholly Owned Subsidiary (FDI)';
    desc = lang==='zh'?'最高風險與資本投入，但享有絕對控制權與技術保護。':'Highest risk and capital, but absolute control and tech protection.';
  } else {
    mode = lang==='zh'?'合資 / 策略聯盟 (Joint Venture / Alliance)':'Joint Venture / Alliance';
    desc = lang==='zh'?'平衡風險與控制，利用當地夥伴知識，但可能面臨決策僵局。':'Balances risk and control, leverages local partner knowledge, but risks gridlock.';
  }

  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 select-none">
      <h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-3">{lang==='zh'?'市場進入模式決策台':'Entry Mode Selector'}</h4>
      <div className="space-y-6">
        <div>
          <div className="flex justify-between text-xs font-bold mb-1">
            <span>{lang==='zh'?'期望的控制程度 (Control)':'Desired Degree of Control'}</span><span>{control>50?'High':'Low'}</span>
          </div>
          <input type="range" min="0" max="100" value={control} onChange={e=>setControl(+e.target.value)} className="w-full accent-blue-600"/>
        </div>
        <div>
          <div className="flex justify-between text-xs font-bold mb-1">
            <span>{lang==='zh'?'資源承諾與風險承受度 (Commitment)':'Resource Commitment / Risk Tolerance'}</span><span>{commitment>50?'High':'Low'}</span>
          </div>
          <input type="range" min="0" max="100" value={commitment} onChange={e=>setCommitment(+e.target.value)} className="w-full accent-red-500"/>
        </div>
        <div className="p-4 bg-[#004030]/10 dark:bg-[#D8C3A5]/10 rounded-lg text-center border border-[#004030]/20 dark:border-[#D8C3A5]/20">
          <div className="text-sm font-bold text-[#004030] dark:text-[#D8C3A5] mb-2">{mode}</div>
          <div className="text-xs text-slate-600 dark:text-slate-400">{desc}</div>
        </div>
      </div>
    </div>
  );
};

// 3. I-R Framework Grid
const IRFrameworkLab = ({lang}) => {
  const [responsiveness, setResponsiveness] = useState(50); // X-axis
  const [integration, setIntegration] = useState(50); // Y-axis
  
  let quad, action, color;
  if(responsiveness>50 && integration>50) { 
    quad = lang==='zh'?'跨國型策略 (Transnational)':'Transnational Strategy'; 
    action = lang==='zh'?'兼顧全球效率與在地回應':'High efficiency + local response'; 
    color='bg-purple-100 text-purple-700 border-purple-400 dark:bg-purple-900/30 dark:text-purple-300'; 
  } else if(responsiveness<=50 && integration>50) { 
    quad = lang==='zh'?'全球化策略 (Global Strategy)':'Global Strategy'; 
    action = lang==='zh'?'標準化產品，追求規模經濟':'Standardized products, scale economies'; 
    color='bg-blue-100 text-blue-700 border-blue-400 dark:bg-blue-900/30 dark:text-blue-300'; 
  } else if(responsiveness>50 && integration<=50) { 
    quad = lang==='zh'?'多國本土化 (Multidomestic)':'Multidomestic Strategy'; 
    action = lang==='zh'?'高度客製化，分公司獨立運作':'Highly customized, autonomous subsidiaries'; 
    color='bg-green-100 text-green-700 border-green-400 dark:bg-green-900/30 dark:text-green-300'; 
  } else { 
    quad = lang==='zh'?'國際策略 (International)':'International Strategy'; 
    action = lang==='zh'?'母國核心能力直接輸出':'Direct export of home competencies'; 
    color='bg-slate-100 text-slate-700 border-slate-400 dark:bg-slate-700 dark:text-slate-300'; 
  }

  const dotX = responsiveness;
  const dotY = 100 - integration; // Invert Y for CSS

  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 select-none md:col-span-2">
      <h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-3">{lang==='zh'?'I-R 整合-回應矩陣':'I-R Framework Grid'}</h4>
      <div className="flex flex-col md:flex-row gap-6">
        <div className="flex-1 space-y-4 justify-center flex flex-col">
          <div>
            <div className="flex justify-between text-xs font-bold mb-1">
              <span>{lang==='zh'?'在地回應壓力 (X軸)':'Local Responsiveness Pressure (X)'}</span>
            </div>
            <input type="range" min="0" max="100" value={responsiveness} onChange={e=>setResponsiveness(+e.target.value)} className="w-full accent-slate-600"/>
          </div>
          <div>
            <div className="flex justify-between text-xs font-bold mb-1">
              <span>{lang==='zh'?'全球整合/降成本壓力 (Y軸)':'Global Integration Pressure (Y)'}</span>
            </div>
            <input type="range" min="0" max="100" value={integration} onChange={e=>setIntegration(+e.target.value)} className="w-full accent-slate-600"/>
          </div>
          <div className={`mt-2 p-3 rounded-lg border text-center ${color}`}>
            <div className="font-bold text-sm">{quad}</div>
            <div className="text-xs mt-1">{action}</div>
          </div>
        </div>

        <div className="w-[200px] h-[200px] shrink-0 relative border-2 border-slate-800 dark:border-slate-200 mx-auto bg-slate-50 dark:bg-slate-900">
          <div className="absolute top-0 bottom-0 left-1/2 w-px bg-slate-400 dark:bg-slate-500 border-dashed border-l"></div>
          <div className="absolute left-0 right-0 top-1/2 h-px bg-slate-400 dark:bg-slate-500 border-dashed border-t"></div>
          
          <div className="absolute top-2 left-2 text-[10px] font-bold text-slate-400 text-center leading-tight">Global</div>
          <div className="absolute top-2 right-2 text-[10px] font-bold text-slate-400 text-center leading-tight">Trans<br/>national</div>
          <div className="absolute bottom-2 left-2 text-[10px] font-bold text-slate-400 text-center leading-tight">Inter<br/>national</div>
          <div className="absolute bottom-2 right-2 text-[10px] font-bold text-slate-400 text-center leading-tight">Multi<br/>domestic</div>
          
          <div className="absolute w-4 h-4 bg-[#E3B152] border-2 border-[#004030] rounded-full shadow-md transition-all duration-300"
               style={{ left:`calc(${dotX}% - 8px)`, top:`calc(${dotY}% - 8px)` }}></div>
        </div>
      </div>
    </div>
  );
};

/* ═══════ APP ═══════ */
function App() {
  const [lang, setLang] = useState('zh');
  const [isDark, setIsDark] = useState(false);
  const [module, setModule] = useState(0);
  const [menuOpen, setMenuOpen] = useState(false);
  const [ttsState, setTtsState] = useState('idle');
  const [studentInfo, setStudentInfo] = useState({ group:'', dept:'', id:'', name:'' });
  const [analytics, setAnalytics] = useState({
    time: Array(TOTAL).fill(0), clicks: Array(TOTAL).fill(0),
    quizCorrect: Array(TOTAL).fill(0), quizTotal: Array(TOTAL).fill(0), quizAnswered: Array(TOTAL).fill(0)
  });
  const menuRef = useRef(null);
  const t = dict[lang];

  const modulesList = [
    {id:0,icon:"📋",num:"0",title:t.m0_nav,comp:<IconBookOpen size={16}/>},
    {id:1,icon:"💎",num:"1",title:t.m1_nav,comp:<IconActivity size={16}/>},
    {id:2,icon:"🗺️",num:"2",title:t.m2_nav,comp:<IconMapPin size={16}/>},
    {id:3,icon:"🚪",num:"3",title:t.m3_nav,comp:<IconArrowRight size={16}/>},
    {id:4,icon:"🌐",num:"4",title:t.m4_nav,comp:<IconNavigation size={16}/>},
    {id:6,icon:"🔗",num:"6",title:t.m6_nav,comp:<IconShare2 size={16}/>},
    {id:7,icon:"🧪",num:"7",title:t.mlab_nav,comp:<IconZapLab size={16}/>},
    {id:8,icon:"📊",num:"8",title:lang==='zh'?'8. 學習分析':'8. Analytics',comp:<IconActivity size={16}/>}
  ];

  // Dark mode
  useEffect(()=>{ document.documentElement.classList.toggle('dark', isDark); },[isDark]);

  // Timer
  useEffect(()=>{
    const iv = setInterval(()=>{
      setAnalytics(a=>{ const nt=[...a.time]; nt[module]++; return {...a,time:nt}; });
    },1000);
    return ()=>clearInterval(iv);
  },[module]);

  // Click tracker
  const handleContentClick = () => {
    setAnalytics(a=>{ const nc=[...a.clicks]; nc[module]++; return {...a,clicks:nc}; });
  };

  // Quiz submit
  const handleQuizSubmit = (mid, correct, answeredCount, totalPool) => {
    setAnalytics(a=>{
      const qc=[...a.quizCorrect]; qc[mid]=correct;
      const qt=[...a.quizTotal]; qt[mid]=totalPool;
      const qa=[...a.quizAnswered]; qa[mid]=answeredCount;
      return {...a,quizCorrect:qc,quizTotal:qt,quizAnswered:qa};
    });
  };

  // Module switch
  const switchModule = (m) => {
    window.speechSynthesis && window.speechSynthesis.cancel();
    setTtsState('idle');
    setModule(m);
    window.scrollTo({top:0,behavior:'smooth'});
  };

  // Close menu on outside click
  useEffect(()=>{
    if(!menuOpen)return;
    const handler=(e)=>{ if(menuRef.current&&!menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('mousedown',handler);
    return ()=>document.removeEventListener('mousedown',handler);
  },[menuOpen]);

  // TTS
  const handleTTS = (action) => {
    if(!('speechSynthesis' in window))return;
    if(action==='stop'){window.speechSynthesis.cancel();setTtsState('idle');return;}
    if(action==='pause'){window.speechSynthesis.pause();setTtsState('paused');return;}
    if(action==='play'){
      if(ttsState==='paused'){window.speechSynthesis.resume();setTtsState('playing');return;}
      window.speechSynthesis.cancel();
      const sep = lang==='zh'?'。 ':'. ';
      let texts=[];
      if(module===0){
        texts=[t.m0_title,t.m0_intro,t.m0_why,t.m0_why_desc,...(t.m0_stats||[]).map(s=>`${s.label}: ${s.val}`),...(t.m0_modules||[]).map(m=>`${m.title}. ${m.desc}`)].filter(Boolean);
      } else if(module>=1&&module<=4){
        const mk=`m${module}`;
        texts=[t[`${mk}_title`],...[1,2,3,4].map(n=>t[`${mk}_p${n}`]).filter(Boolean),...(t[`${mk}_cards`]||[]).map(c=>`${c.title}. ${c.desc}`),...(t[`${mk}_terms`]||[]).flatMap(tr=>[tr.front.replace('\n',' '),tr.back])].filter(Boolean);
      } else if(module===6){
        texts=[t.m6_title,t.m6_desc].filter(Boolean);
      } else if(module===7){
        texts=[t.mlab_title,t.mlab_desc].filter(Boolean);
      } else {
        texts=[t.analytics_title,t.analytics_desc].filter(Boolean);
      }
      const text=texts.join(sep);
      const utterance=new SpeechSynthesisUtterance(text);
      utterance.rate=0.95;
      const voices=window.speechSynthesis.getVoices();
      if(lang==='zh'){
        const v=voices.find(v=>v.lang==='zh-TW'&&v.name.includes('Yating'))||voices.find(v=>v.lang==='zh-TW')||voices.find(v=>v.lang.startsWith('zh'));
        if(v)utterance.voice=v; utterance.lang='zh-TW';
      } else {
        const v=voices.find(v=>v.lang==='en-GB'&&(v.name.includes('Male')||v.name.includes('Daniel')))||voices.find(v=>v.lang==='en-GB')||voices.find(v=>v.lang.startsWith('en'));
        if(v)utterance.voice=v; utterance.lang='en-GB';
      }
      utterance.onend=()=>setTtsState('idle');
      utterance.onerror=()=>setTtsState('idle');
      window.speechSynthesis.speak(utterance);
      setTtsState('playing');
    }
  };

  // CSV export with DOMPurify
  const exportCSV = () => {
    const safeGroup = window.DOMPurify.sanitize(studentInfo.group);
    const safeDept = window.DOMPurify.sanitize(studentInfo.dept);
    const safeId = window.DOMPurify.sanitize(studentInfo.id);
    const safeName = window.DOMPurify.sanitize(studentInfo.name);

    const BOM='\uFEFF';
    const header='Group,Dept,ID,Name,Module,TimeSpent(sec),Clicks,QuizCorrect,QuizAnswered,QuizTotal\n';
    let rows='';
    modulesList.forEach((m,i)=>{
      rows+=`${safeGroup},${safeDept},${safeId},${safeName},${m.title},${analytics.time[i]},${analytics.clicks[i]},${analytics.quizCorrect[i]},${analytics.quizAnswered[i]},${analytics.quizTotal[i]}\n`;
    });
    
    // 依據規範產生檔名：品牌_主標題_組別_學號_姓名_日期
    const dateStr = new Date().toISOString().split('T')[0].replace(/-/g, '');
    const safeTitle = t.title.replace(/ /g, '_');
    const filename = `${t.brand}_${safeTitle}_${safeGroup}_${safeId}_${safeName}_${dateStr}.csv`;

    const blob=new Blob([BOM+header+rows],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=filename;
    a.click();
    URL.revokeObjectURL(url);
  };

  // 取得當前在 array 中的 index，解決跳號產生的上一頁/下一頁錯誤
  const currentIdx = modulesList.findIndex(m => m.id === module);
  const prevId = currentIdx > 0 ? modulesList[currentIdx - 1].id : module;
  const nextId = currentIdx < modulesList.length - 1 ? modulesList[currentIdx + 1].id : module;

  // Render learning module
  const renderLearning = (num) => {
    const mk=`m${num}`;
    return (
      <div className="space-y-6 text-lg leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in">
        <H2 icon={modulesList.find(m=>m.id===num)?.icon} number={num}>{t[`${mk}_title`]}</H2>
        <p>{t[`${mk}_p1`]}</p>
        {t[`${mk}_p2`] && <p className="p-4 bg-slate-100 dark:bg-slate-800 rounded-lg italic font-serif text-base">{t[`${mk}_p2`]}</p>}
        {t[`${mk}_p3`] && <p>{t[`${mk}_p3`]}</p>}
        {t[`${mk}_p4`] && <p>{t[`${mk}_p4`]}</p>}
        {t[`${mk}_cards`] && (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {t[`${mk}_cards`].map((c,i)=>(
              <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700 shadow-sm">
                <h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-2">{c.title}</h4>
                <p className="text-sm text-slate-600 dark:text-slate-400">{c.desc}</p>
              </div>
            ))}
          </div>
        )}
        <div className="mt-8 select-none">
          <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-4">{t.key_terms}</h3>
          <div key={`terms-${module}`} className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {t[`${mk}_terms`].map((term,i)=><FlipCard key={i} front={term.front} back={term.back} t={t}/>)}
          </div>
        </div>
        <ModuleQuiz key={`quiz-${module}`} questions={t[`${mk}_q`]} t={t} moduleId={module} onQuizSubmit={handleQuizSubmit}/>
      </div>
    );
  };

  // Render Resources
  const renderResources = () => {
    const links = [
      {label:lang==='zh'?'Pankaj Ghemawat: Distance Still Matters':'Distance Still Matters (HBR)',url:'https://hbr.org/2001/09/distance-still-matters-the-hard-reality-of-global-expansion',desc:lang==='zh'?'Ghemawat 提出 CAGE 距離架構的經典 HBR 文章。':'The classic HBR article introducing the CAGE distance framework.'},
      {label:lang==='zh'?'Michael Porter: 國家競爭優勢':'The Competitive Advantage of Nations',url:'https://hbr.org/1990/03/the-competitive-advantage-of-nations',desc:lang==='zh'?'Porter 鑽石模型的原文文獻。':'Porter\'s original article on the National Diamond Model.'},
      {label:lang==='zh'?'Bartlett & Ghoshal: 跨國型策略':'Managing Across Borders',url:'https://hbr.org/1989/08/managing-across-borders-the-transnational-solution',desc:lang==='zh'?'探討 I-R 矩陣與跨國型組織的經典著作。':'Classic work discussing the I-R matrix and transnational organizations.'}
    ];
    return (
      <div className="space-y-10 animate-fade-in select-none">
        <H2 icon="🔗" number={6}>{t.m6_title}</H2>
        <p className="text-slate-600 dark:text-slate-400">{t.m6_desc}</p>
        <div className="grid md:grid-cols-2 gap-3">{links.map((l,i)=><LinkCard key={i} {...l}/>)}</div>
        <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 rounded-xl p-5 border border-[#004030]/20 dark:border-[#D8C3A5]/20">
          <p className="text-sm text-slate-600 dark:text-slate-400">⚠️ {lang==='zh'?'以上連結為外部資源，內容可能隨時變更。請自行確認資訊的時效性與正確性。':'Links are external resources that may change. Please verify timeliness and accuracy independently.'}</p>
        </div>
      </div>
    );
  };

  // Render Lab
  const renderLab = () => (
    <div className="space-y-8 animate-fade-in select-none">
      <H2 icon="🧪" number={7}>{t.mlab_title}</H2>
      <p className="text-slate-600 dark:text-slate-400">{t.mlab_desc}</p>
      <div className="grid md:grid-cols-2 gap-6">
        <CAGELab lang={lang}/>
        <EntryModeLab lang={lang}/>
      </div>
      <IRFrameworkLab lang={lang}/>
    </div>
  );

  // Render Analytics
  const renderAnalytics = () => {
    const totalTime = analytics.time.reduce((s,v)=>s+v,0);
    const totalClicks = analytics.clicks.reduce((s,v)=>s+v,0);
    const totalCorrect = analytics.quizCorrect.reduce((s,v)=>s+v,0);
    const totalAnswered = analytics.quizAnswered.reduce((s,v)=>s+v,0);
    const overallAcc = totalAnswered>0?Math.round(totalCorrect/totalAnswered*100):0;
    const canExport = studentInfo.group&&studentInfo.dept&&studentInfo.id&&studentInfo.name;
    return (
      <div className="space-y-8 animate-fade-in select-none">
        <H2 icon="📊" number={8}>{t.analytics_title}</H2>
        <p className="text-slate-600 dark:text-slate-400">{t.analytics_desc}</p>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
            <div className="text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{totalTime}{t.analytics_sec}</div>
            <div className="text-xs text-slate-500 mt-1">{t.analytics_total_time}</div>
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
            <div className="text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{totalClicks}{t.analytics_times}</div>
            <div className="text-xs text-slate-500 mt-1">{t.analytics_total_clicks}</div>
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
            <div className="text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{overallAcc}%</div>
            <div className="text-xs text-slate-500 mt-1">{t.analytics_overall_acc}</div>
          </div>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm border-collapse">
            <thead>
              <tr className="bg-[#004030] text-white">
                <th className="px-3 py-2 text-left">{t.analytics_module}</th>
                <th className="px-3 py-2 text-center">{t.analytics_time}</th>
                <th className="px-3 py-2 text-center">{t.analytics_clicks}</th>
                <th className="px-3 py-2 text-center">{t.analytics_correct_ans_total}</th>
              </tr>
            </thead>
            <tbody>
              {modulesList.map((m,i)=>(
                <tr key={i} className="border-b border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50">
                  <td className="px-3 py-2 font-medium text-slate-700 dark:text-slate-300">{m.title}</td>
                  <td className="px-3 py-2 text-center">{analytics.time[i]}{t.analytics_sec}</td>
                  <td className="px-3 py-2 text-center">{analytics.clicks[i]}{t.analytics_times}</td>
                  <td className="px-3 py-2 text-center">{analytics.quizTotal[i]>0?`${analytics.quizCorrect[i]} / ${analytics.quizAnswered[i]} / ${analytics.quizTotal[i]}`:t.analytics_no_data}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
          <h3 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_form_title}</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label className="text-sm font-medium text-slate-600 dark:text-slate-400">{t.analytics_group}</label>
              <select value={studentInfo.group} onChange={e=>setStudentInfo(s=>({...s,group:e.target.value}))}
                className="w-full mt-1 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-300">
                <option value="">--</option>
                {t.group_options.map(g=><option key={g} value={g}>{g}</option>)}
              </select>
            </div>
            <div>
              <label className="text-sm font-medium text-slate-600 dark:text-slate-400">{t.analytics_dept}</label>
              <input placeholder={t.analytics_dept_ph} value={studentInfo.dept} onChange={e=>setStudentInfo(s=>({...s,dept:e.target.value}))}
                className="w-full mt-1 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-300"/>
            </div>
            <div>
              <label className="text-sm font-medium text-slate-600 dark:text-slate-400">{t.analytics_id}</label>
              <input placeholder={t.analytics_id_ph} value={studentInfo.id} onChange={e=>setStudentInfo(s=>({...s,id:e.target.value}))}
                className="w-full mt-1 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-300"/>
            </div>
            <div>
              <label className="text-sm font-medium text-slate-600 dark:text-slate-400">{t.analytics_name}</label>
              <input placeholder={t.analytics_name_ph} value={studentInfo.name} onChange={e=>setStudentInfo(s=>({...s,name:e.target.value}))}
                className="w-full mt-1 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-300"/>
            </div>
          </div>
          <div className="mt-4">
            <button onClick={exportCSV} disabled={!canExport} className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 transition-colors">
              {canExport?t.analytics_export_csv:t.analytics_fill_required}
            </button>
          </div>
        </div>
      </div>
    );
  };

  // Render content
  const renderContent = () => {
    switch(module){
      case 0: return (
        <div className="space-y-8 text-lg leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in">
          <div className="bg-[#004030] dark:bg-slate-800 rounded-2xl p-6 sm:p-8 text-white select-none">
            <p className="text-xs font-bold uppercase tracking-widest text-[#D8C3A5] mb-3">{lang==='zh'?'課程簡介':'Course Introduction'}</p>
            <h2 className="text-2xl sm:text-3xl md:text-4xl font-serif font-black text-white mb-4">{t.m0_title}</h2>
            <p className="text-[#D8C3A5]/90 text-base leading-relaxed">{t.m0_intro}</p>
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border-l-4 border-[#D8C3A5] shadow-sm select-none">
            <h3 className="text-xl font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-3">{t.m0_why}</h3>
            <p className="text-base text-slate-600 dark:text-slate-400">{t.m0_why_desc}</p>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 select-none">
            {t.m0_stats.map((s,i)=>(
              <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
                <div className="text-2xl md:text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{s.val}</div>
                <div className="text-xs text-slate-500 dark:text-slate-400">{s.label}</div>
              </div>
            ))}
          </div>
          <div className="select-none">
            <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-4">{lang==='zh'?'課程模組':'Course Modules'}</h3>
            <div className="space-y-3">
              {t.m0_modules.map((m,i)=>(
                <button key={i} onClick={()=>switchModule(i+1)}
                  className="w-full flex items-center gap-5 bg-white dark:bg-slate-800 rounded-xl px-6 py-4 border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all group text-left">
                  <div className="text-3xl font-black font-serif text-[#D8C3A5] w-10 shrink-0">{m.num}</div>
                  <div className="flex-1 min-w-0">
                    <div className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{m.title}</div>
                    <div className="text-sm text-slate-500 dark:text-slate-400">{m.desc}</div>
                  </div>
                  <IconChevronRight size={20} className="text-slate-300 group-hover:text-[#004030] dark:group-hover:text-[#D8C3A5] shrink-0 transition-colors"/>
                </button>
              ))}
            </div>
          </div>
          <div className="flex justify-end select-none">
            <button onClick={()=>switchModule(1)}
              className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white uppercase text-sm tracking-wider shadow-md rounded-lg transition-all">
              {t.m0_start}
            </button>
          </div>
        </div>
      );
      case 1: case 2: case 3: case 4: return renderLearning(module);
      case 6: return renderResources();
      case 7: return renderLab();
      case 8: return renderAnalytics();
      default: return null;
    }
  };

  return (
    <div className={`min-h-screen bg-[#f4f4f4] dark:bg-[#121212] font-sans flex flex-col overflow-x-hidden pt-16 selection:bg-[#004030] selection:text-white dark:selection:bg-[#D8C3A5] dark:selection:text-[#004030]`}>
      {/* HEADER */}
      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30 select-none">
        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
          <div className="flex items-center gap-2">
            {/* Hamburger */}
            <div className="relative" ref={menuRef}>
              <button onClick={()=>setMenuOpen(!menuOpen)} className="p-2 hover:bg-white/10 rounded-lg transition-colors" aria-label="Toggle menu">
                {menuOpen ? <IconX size={20}/> : <IconMenu size={20}/>}
              </button>
              {menuOpen && (
                <div className="absolute top-full left-0 mt-1 w-64 max-w-[calc(100vw-2rem)] max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100] overflow-x-hidden">
                  <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-2 border-b border-slate-200 dark:border-slate-700">
                    <p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p>
                  </div>
                  {modulesList.map(m=>(
                    <button key={m.id} onClick={()=>{switchModule(m.id);setMenuOpen(false);}}
                      className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-left
                        ${module===m.id
                          ?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold'
                          :'text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                      <span className={module===m.id?'text-[#D8C3A5]':'opacity-50'}>{m.icon}</span>
                      <span className="truncate">{m.title}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
            {/* Brand */}
            <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center gap-2 text-white hover:text-[#D8C3A5] transition-colors">
              <span className="font-serif font-black text-[#D8C3A5] text-lg tracking-widest">{t.brand}</span>
              <span className="font-serif font-bold text-white text-sm hidden sm:inline truncate max-w-[200px]">{t.title}</span>
            </button>
          </div>
          {/* Controls */}
          <div className="flex items-center gap-1 sm:gap-2">
            <div className="flex items-center gap-1 mr-1 sm:mr-2">
              {ttsState==='idle' && <button onClick={()=>handleTTS('play')} className="p-1.5 hover:bg-white/10 rounded-lg" title={t.audio_read}><IconPlay size={16}/></button>}
              {ttsState==='playing' && <>
                <button onClick={()=>handleTTS('pause')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconPause size={16}/></button>
                <button onClick={()=>handleTTS('stop')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconSquare size={16}/></button>
              </>}
              {ttsState==='paused' && <>
                <button onClick={()=>handleTTS('play')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconPlay size={16}/></button>
                <button onClick={()=>handleTTS('stop')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconSquare size={16}/></button>
              </>}
            </div>
            <button onClick={()=>setLang(l=>l==='zh'?'en':'zh')} className="px-2 py-1 text-xs sm:text-sm font-bold border border-[#D8C3A5]/50 rounded-lg hover:bg-white/10 transition-colors">
              {lang==='zh'?'EN':'中'}
            </button>
            <button onClick={()=>setIsDark(!isDark)} className="p-1.5 sm:p-2 hover:bg-white/10 rounded-lg transition-colors">
              {isDark?<IconSun size={18}/>:<IconMoon size={18}/>}
            </button>
          </div>
        </div>
      </header>

      {/* BODY */}
      <div className="flex-1 flex max-w-7xl mx-auto w-full px-3 sm:px-4 lg:px-6 py-6 gap-6">
        {/* Sidebar */}
        <aside className="hidden md:block w-64 shrink-0 select-none">
          <div className="sticky top-20 space-y-1">
            {modulesList.map(m=>(
              <button key={m.id} onClick={()=>switchModule(m.id)}
                className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all text-left
                  ${module===m.id
                    ?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold shadow-sm'
                    :'text-slate-600 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 hover:text-[#004030] dark:hover:text-[#D8C3A5]'}`}>
                <span className={module===m.id?'text-[#D8C3A5]':'opacity-60'}>{m.icon}</span>
                <span className="truncate">{m.title}</span>
              </button>
            ))}
          </div>
        </aside>

        {/* Main */}
        <main className="flex-1 min-w-0" onClick={handleContentClick}>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 md:p-8">
            {renderContent()}
          </div>
          {/* Bottom nav */}
          <div className="mt-6 flex justify-between items-center pt-6 border-t border-slate-300 dark:border-slate-700 select-none">
            <button onClick={()=>switchModule(prevId)} disabled={currentIdx === 0}
              className="px-4 sm:px-6 py-3 font-serif font-bold text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5] disabled:opacity-0 uppercase text-sm tracking-wider flex items-center transition-colors">
              ← {t.nav_prev}
            </button>
            <button onClick={()=>switchModule(nextId)} disabled={currentIdx === modulesList.length - 1}
              className="px-6 sm:px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white disabled:opacity-0 uppercase text-sm tracking-wider shadow-md flex items-center rounded-lg transition-all">
              {t.nav_next} <IconArrowRight size={16} className="ml-2"/>
            </button>
          </div>
        </main>
      </div>

      {/* FOOTER */}
      <footer className="h-8 bg-[#004030] flex items-center justify-between px-4 shrink-0 select-none">
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs truncate">{t.date} · {t.copyright}</span>
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs flex items-center gap-3 shrink-0">
          <span className="flex items-center gap-1 hidden sm:flex">
            Architect:&nbsp;
            <a href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo"
              target="_blank" rel="noopener noreferrer"
              className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">
              Prof. Shihmin Lo
            </a>
          </span>
          <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}
            className="text-[#D8C3A5] hover:text-white transition-colors font-bold cursor-pointer border-l border-slate-600 pl-3">
            Top ↑
          </button>
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
